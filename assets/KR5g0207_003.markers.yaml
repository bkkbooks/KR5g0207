  - {type: variant, offset: 7, length: 1, content: 典, CK-KZ: 方無量世界令彼下士得見寶光開諸愚闇與道結緣令道反本於是天尊舉手彈指無上寶光如鏡之圓從掌中出徹照下方無量國土乃至}
  - {type: variant, offset: 7, length: 1, content: 典, CK-KZ-jye: 方無量世界令彼下士得見寶光開諸愚闇與道結緣令道反本於是天尊舉手彈指無上寶光如鏡之圓從掌中出徹照下方無量國土乃至}
  - {type: variant, offset: 7, length: 1, content: 典, YP-C: 方無量世界令彼下士得見寶光開諸愚闇與道結緣令道反本於是天尊舉手彈指无上寶光如鏡之圓從掌中出徹照下方无量國土乃至}
  - {type: variant, offset: 9, length: 1, content: 衆, CK-KZ: 塗惡趣九幽苦魂皆得明朗了了淸淨地獄休息報對寕閑聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切眾生舉眼遙見不思議城如看掌中無有遺失見斯光者必當得往長樂福堂入寶城中快樂無極天尊歎眞士大眾悉披襟爾時不思議城同聞大眾說偈頌己白天尊言大德天尊唯願大慈不捨弘心賜大光明照於下方無量世界令彼下士得見寶光開諸愚闇與道結緣令道反本於是天尊舉手彈指無上寶光如鏡之圓從掌中出徹照下方無量國土乃至三塗惡趣九幽苦魂皆得明朗了了淸淨地獄休息報對寕閑聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切眾生舉眼遙見不思議城如看掌中無有遺失見斯光者必當得往長樂福堂入寶城中快樂無極眾}
  - {type: variant, offset: 9, length: 1, content: 衆, CK-KZ-jye: 塗惡趣九幽苦魂皆得明朗了了淸淨地獄休息報對寕閑聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切眾生舉眼遙見不思議城如看掌中無有遺失見斯光者必當得往長樂福堂入寶城中快樂無極天尊歎}
  - {type: variant, offset: 9, length: 1, content: 衆, YP-C: 塗惡趣九幽苦魂皆得明朗了了淸淨地獄休息報對寕閑聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切眾生舉眼遙見不思議城如看掌中无有遺失見斯光者必當得往長樂福堂入寶城中快樂無極眾}
