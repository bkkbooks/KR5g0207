  - {type: variant, offset: 5478, length: 201, content: 天尊歎眞士大衆悉披襟爾時不思議城同聞大衆說偈頌已白天尊言大德天尊唯願大慈不捨弘心賜大光明照於下方无量世界令彼下士得見寶光開諸愚闇與道結縁令道反本於是天尊舉手彈指无上寶光如鏡之圓從掌中出徹照下方无量國土乃至三徒惡趣九幽苦魂皆得眀朗了了清淨地獄休息報對寧閑聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切衆生舉眼遥見不思議城如看掌中无有遺失見斯光者必當得徃長樂福堂入寶城中快樂无極大乘妙林經卷中, CK-KZ: ''}
