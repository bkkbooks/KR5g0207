body:
  text: 序品第一元始天尊時在不思議山七寶城中元陽宫內師子座上八威備衛端坐間居身心不動經七小劫不起于座放大光明遍照十方無量國土微塵世界無不遍及時彼三千大千世界無量國土諸仙真聖洗然驚歎異口同音俱發聲言咄哉彼土大德天尊以何因緣放希有光奇特妙相時諸三千大千世界微塵國土諸仙聖衆遙望山中光相挺特妙麗希有無以為喻馳誠欣慕口不能言咸欲競往爾時天尊安庠動念以他心智遙觀彼土他方聖衆心意虔恭是諸聖衆純是上士悉堪受度因發大聲告諸十方無量國土汝等真士宿植德本純一無二是我真子堪持寶藏我今欲入長樂妙土汝等真士乘我希有微妙光明俱來法座值我今日難勝之法爾時十方微妙世界無量國土他方聖衆聞是聲音心大歡喜普乘神光飛空越谷皆悉上士尋光而來是諸大衆煩惱已空明了法性其字曰淨行真人妙相真人寶光真人曜明真人辨才真人普等真人聖行真人遍通真人德滿真人度命真人慜濟真人導師真人善愛真人達相真人高上真人勝意真人開明真人守藏真人護持真人等觀真人寂定真人無礙真人凌空真人常念真人化通真人善變真人靜定真人妙光真人妙花真人大慈真人慧明真人寶蓋真人等諸大衆無量真人與諸徒從并及無量天龍大力神王無鞅數衆細雨密霧一時俱到不思議山圍繞三匝瞻仰天尊安庠雅步稽首禮足問訊畢即依位而坐爾時天尊以大慈心熏修大衆微聲唱言子等真士於無量劫衆善普會致於今日值希有光得覩難勝未曾有法普來集會不可思議我今欲入長樂妙境汝等真士若有所疑恣來啓問於是淨行真人即從座起正巾斂褐長跪稽首白天尊言我今等衆乘希有光欲有所問若垂聽許乃敢咨陳天尊告曰淨行真人子今善能為衆開發咨請法相恣汝所問勿自疑難吾當為汝分别解說决了所疑於是淨行既蒙聽許心意踊躍歡喜無量白天尊言如是身相大光普遍妙麗希有光相挺特超百千日不可思議我自思惟如是身相希有難思若有衆生見斯光者即名真士能見諸法不壞眼根天尊告曰淨行真士實如所言我今身相有無量光名無量義若有衆生能見我身微妙光明即得眼根通達明淨能了諸法觀諸法性性相湛然不壞世法而得真相又我身相有無量光名無量義若有衆生能聞我身微妙光明即得耳根通達明淨能了諸法聞諸法性性相湛然不壞世法而得真相又我身相有無量光名無量義若有衆生能嗅我身微妙光明即得鼻根通達明淨能了諸法嗅諸法性性相湛然不壞世法而得真相又我真相有無量光名無量義若有衆生能言我身微妙光明即得舌根通達明淨能辨諸法言諸法性性相湛然不壞世法而得真相又我身相有無量光名無量義若有衆生能觸我身微妙光明即得身根通達明淨能覺諸法知諸法性性相湛然不壞世法而得真相又我身相有無量光名無量義若有衆生能知我身微妙光明即得心根通達明淨能了諸法悟諸法性性相湛然不壞世法而得真相淨行真士我今身相無量光明假使盡諸十方三千大千世界碎為微塵一一塵中復為十方無量世界又復碎諸無量世界皆為微塵以此塵數比我身光千億萬分未得其一是故十方無量國土若有衆生遇斯光者即得身中六根明淨通達無礙能了諸法性相湛然不壞世法而得真相以此光明莊嚴一切無量無邊微塵世界一切衆生皆悉成就無上正真金剛妙相光明功德不可思議終劫說之亦不能盡於是淨行并諸大衆聞天尊說微妙光明利益衆生無量無邊俱發聲言歎未曾有大德天尊微妙身相光明大藏福惠莊嚴實無窮盡是時妙相真人聞天尊說法身微妙光明特甚天上人間未有斯匹前進稽首白天尊言大德天尊我今所見天尊身相大光普遍諸微塵界他土大士十方聖衆俱來集會欲聞要言未審今會不思議城希所常有天尊所演光相微妙無上法輪今之所說當何名號唯願解說訣了所疑令此衆會得眄篇目心意泰然功德無量爾時天尊欣然悅豫歎妙相言善哉善哉妙相真士善能通達觀諸法性心意無㝵故能為衆咨請要言子等諦聽我今為說微妙難思未曾有法自昔以來為衆開演未如今日大光普照他土世界微塵聖衆俱來集會不思議山聞此勝法我所說無上尊經名為妙林亦名勝習子等諦思無上大乘微妙經典若有一人聞此經名一心信受思念恭敬尊重讃歎解其義味為人演說稱揚大道當知是人曾於無量億劫之中已種善根功德成辦故於今日得聞大乘微妙經典此人即是一切衆生大慈悲父開悟一切為衆道師世間衆生當於此處勤種功德能以一心不生懈退是人所得大乘功德無量無邊不可稱說假使盡諸十方三千大千世界一切草木寸斬為籌以此籌算其人功德亦不能盡是故汝等俱入寶城聞此妙林大乘名字必得上道入於長樂常住妙土功德巍巍與我無異是時大衆聞說經名一時開悟舉手彈指稽首稱善於是寶光執笏安庠前進作禮上白天尊臣以有幸得預斯集向聞所說微妙大乘祕要經典所說經名妙林勝習臣等下愚未能自了不審天尊以何義故名此尊經為妙林邪願為解說示以要言令衆曉悟饒益一切决了所疑天尊告曰寶光真士乃於今日能發大慈為衆咨請真實要言開悟將來不可思議汝今復座吾當為汝分别解脫令衆得明開悟將來使得安樂我今所說大乘妙林無上尊經功德無量不可思議猶彼寶林能生果實資益一切食此花實身相金光無不微妙人聞此經一心聽受得其義味智慧圓明身相微妙以是之故與彼無異又彼寶林根株莖葉悉是真文微風一動能發洞章聲音微妙若得聞者了然悟道我今法相如彼妙林若有衆生微心一感現以聲教聲音微妙若有聞者即得正真以是之故與彼無異又彼妙林莫知本始劫劫常生種類不絶我今法相如彼寶林莫知本始劫劫出現種性不絶以是之故與彼無異又彼寶林枝條覆蔭三千世界無不周遍我今法相德蔭三千大千國土彌羅無外以是之故與彼無異又彼妙林無心隨順從風偃仰假有霜雪不能凋殘我今法相亦復如是無心善順物感常通假有煩惱三塗惡報莫能傷害以是之故與彼無異諸微塵土一切大衆見我光明難勝希有越空赴谷俱來集會不思議山習我勝因聞斯要訣諸來大衆聞此大乘智慧日新功德無量以是之故亦名勝習寶光等衆無量無邊聞此要言咸皆開悟同時行禮稽首稱善於是寶光而說偈言善巧無上大悲尊不捨四弘度衆生示現端坐不思議放大光明照十方微塵國土無邊衆俱見法身微妙光大衆純一無上士堪持妙林希有經他心了達無邊境高聲唱言真實賓我今欲入長樂土故命時衆來受持衆等同聞大歡喜飛空越谷一時臨煩惱已盡皆自在明了法性大乘門圍繞瞻聽忘疲厭安庠前進禮天尊大悲熏修無限量唱說時衆久行因故得聞今希有法善哉集會不思議功圓行滿入長樂告衆疑問在今晨故得慧明無上士淨行正念動三千乘斯大會希有座告令疑網任咨陳既蒙聽命勝所請進前敢言希有光大悲善巧說身相無量光明奇特尊遇得斯照六相淨不壞世法即真身假令微塵諸世界細末盡數不能量又有久修真大士號曰妙相問經名故得大慈降法雨篇目名字總披陳若得遇聞此名號功德福惠悉莊嚴假令三千諸草木寸斬算數不能知我亦乘今無上惠更問經名義云何既蒙法王無上訣名義諸疑悉已除我等時衆同斯集自慶得聞妙林經故得上登無極位一切衆生離囂塵寶光等是時大衆聞說偈頌已心大歡喜咸皆開悟一時稽首復還本座觀真相品第二爾時曜明真人前進稽首白天尊言我等時衆聞天尊說微妙光眀希有難值若後有人遇斯光者即得六根通達明淨不壞世法而得真相臣以下愚未了斯義不審世間及以真相為一相邪為異相邪若是一相何以名世若世是真何不名真若異相者既得真相云何不壞世間不壞云何得真世間不壞而得真者譬如種子種子不壤芽莖花實從何而生如是二趣實未能了願垂㫖訣得釋所疑天尊告曰曜明真士善能方便為諸衆生訣此疑惑子今復座吾當為說子今所問世間真相為一相邪為異相邪今當問子子之所見為法見邪為相見邪曜明答曰大德天尊世間真相有法見邪有相見邪天尊答曰曜明真士真相世間本無差别衆生所見未能通達但觀其相未能見法是故分别世間真相其相不同今以慧眼觀世間相即相是真能了真相名為見法以是之故不壞世間而得真相曜明又問大德天尊不壞世間而得真相未審世間以何為相而言不壞即是真相天尊告曰曜明真士世間相者即是無明貪著愛見瞋恚愚癡等諸煩惱是世間相曜明又問大德天尊無明貪愛瞋恚愚癡等諸煩惱是世間相既言不壞即得真相是則真相猶有貪愛既有貪愛是真何須說言斷諸煩惱而得真相天尊告曰曜明真士實如所言不斷煩惱而得真相今言斷者為諸衆生未能見法唯見無明貪愛愚癡瞋恚煩惱故須說斷而得真相若人能知煩惱性空本無貪愛無明永淨無法可斷以是當知不斷煩惱而得真相真相無相無相無得無明無法無法無斷無斷無得名斷煩惱無得無斷名得真相以是當知不斷煩惱而得真相曜明又問大德天尊真相煩惱既無二相無二相故言得真相何以不言煩惱真相無二相故言得煩惱天尊答曰曜明真士如向所說是有二種一者相見二者法見法見之人言得真相相見之人言得煩惱以是當知法見之人常觀妙本故得真相相見之人常觀粗迹故得煩惱若人能知煩惱性空未曾有法從迹觀本名得法見若復有人無明暗蔽唯見煩惱從無明見名為真相又語曜明若復有人見有煩惱又有真相煩惱真相皆為煩惱若人能知此煩惱不異真相真相無相煩惱真相名為真相又語曜明子向問言譬如種子種子不壞芽莖枝葉花實等從何而生吾今問子種子壞邪芽實生邪種子若壞壞則無因無因有果斯無是處芽生種壞壞則不生壞為生因亦非是處以是當知種子芽莖枝葉花實非生非壞非因非果非不因果煩惱真相亦復如是非前非後非一非異非不一異又語曜明汝謂種子壞乃芽生今又問子種壞芽生壞時生耶未壞生耶壞後生耶壞時生者以壞為生生則不生生而壞者以生為壞壞則不壞云何種壞而得芽生譬如蔭壞身則不生無蔭有身理則不然以是當知種子既壞芽則不生無種有芽理亦不然是故我言壞則不生若有說言壞時生者與壞同體云何得生譬如一身諸根同體云何頭壞而得足生頭壞足生理則不然以是當知種子壞時芽則不生生壞同體理亦不然是故我言壞時不生壞後生者生滅相離云何為因譬如敗種種已先滅滅即無芽云何芽後從敗種生以是當知壞後不生壞已芽生理亦不然是故我言種子壞後芽亦不生又語曜明種壤芽生生壤一耶生壞異耶生壞一者壞則相違云何同體滅則不生云何壞生生則不滅云何生壞異者異則非因非因生果理則不然譬如虛空非兔角因虛空非因生兔角果理則不然以是當知異亦不生云何有生又語曜明未壞生者是則種子體中未變未變芽生芽生則無因無因有果無種有芽理則不然猶如無形影則不生形若未生有影生者當知此影不從形生譬如麻子麻子未壤油則不生以是當知未壞不生云何有生又語曜明壞後生者彼種巳滅滅則無因滅後生芽此芽始生生則非果彼種滅已有芽生者理則不然猶有無乳酪則不生若無彼乳而有此酪是則酪有不從乳生以是當知壞後不生云何有生檢求生相畢竟永滅不可得故是故無生爾時辨才即從座起安庠而進白天尊言我自思惟一切衆生飄浪生死皆由無明貪著愛見我又思惟愛見無明從何而有致令衆生飄浪生死是生死本從心生耶從眼生耶從耳生耶從鼻生耶從舌生耶從內生耶從外生耶從有生耶從空生耶我今等衆實未能了願為解說得釋所疑天尊告曰辨才真士善哉斯問子今復座當為子說生死根本從空而生亦從有生從內而生亦從外生從鼻而生亦從舌生從眼而生亦從耳生本無從生亦從心生何以故心法空故心法既空無明亦空無眀既空貪愛亦空貪愛既空生死亦空生死既空眼法亦空眼法空故耳法亦空耳法空故鼻法亦空鼻法空故舌法亦空舌法空故內外亦空內外空故空有亦空以是因緣生死根本從空而生又語辨才空法本空心法亦空云何空法生心法空心法既空從空生心是則東方本空生西方空既知東方本空不生西空當知空法本空不生心法心法既空不從空生當知心法法相本空不生無明既知無明本空不從心生當知無明本空不生貪著既知貪著本空不從無明當知貪著亦空不生愛見既知愛見本空不從貪著當知愛見亦空不生心法既知心法本空不從愛見當知心法亦空不生眼法既知眼法本空不從心生當知眼法亦空不生耳法既知耳法本空不從眼生當知耳法亦空不生鼻法既知鼻法本空不從耳生當知鼻法亦空不生舌法既知舌法本空不從鼻生當知舌法亦空不生內法既知內法本空不從舌生當知內法亦空不生外法既知外法本空不從內生當知外法亦空不生有法既知有法本空不從外生當知有法亦空不生空法既知空法本空不從有生當知空法亦空不生生死既知生死本空不從空生當知生死亦不生死一切有為煩惱以是當知有為生死衆生飄浪如虛中雲如空中色如谷中響如水中月如鏡中像如熱中炎如電中火如聾中聽如盲中視如啞中言如二頭鶴如三足雞如龜中毛如兔中角中是無明貪著愛見生死之本亦復如是畢竟皆空不可論說譬如燈滅不可尋求生死本空亦復如是如大猛火如四毒蛇不可親近生死之法亦復如是子等當復作如是觀乃得無為出離生死於是辨才等衆聞是要言歡喜踴躍歎未曾有於是大衆同聲稱善而說偈言無上大悲尊善巧說真相世間煩惱本即無上慧因衆生未能了故說斷貪瞋若知本非有生死即道場無明性永滅煩惱諒風聲慧眼當清淨法見明重昏本來無二相粗妙信開緣若能辨無二三界不思議執心在真相道場恚貪瞋種子未曾滅芽莖實不生先有不從因先無何所生三時辨生法種子實非因自體未曾有芽莖何所從辨才無上士善咨生死因大悲諒無盡為衆悉敷陳無明與生死譬如空谷聲聾盲所聞見世間實不然智者觀生死猶如大幻師土梗何曾走木雞詎翔空若能明斯趣一切不思議爾時天尊歎大衆言善哉善哉汝等今衆聞希有法體了真相實如所陳乘我今日宣語將來一切衆生令得曉了與今無異爾時大衆稽首稱善辨邪正品第三爾時普等真人即從座起前進作禮上白天尊我自思惟天尊身相光明挺特微妙難思如金剛王摧折一切智慧明了結習永除端然獨步不思議城我今欲問未敢自陳願垂大慈賜示儀軌修行階級其義云何使將來世得見正真天尊告曰善哉善哉普等真士善能利益將來衆生能發斯問開悟愚蒙子今復座吾當為說凡所問者具有二種一者正問二者邪問若正問者與道為親若邪問者是魔眷屬普等又問何等為正何等為邪天尊告曰若人作有為問無為故問名為邪問非有為問非無為問名為正問若人見生故問見滅故問各為邪問不見生問不見滅問名為正問若人見住故問見壞故問名為邪問不見住問不見壞問名為正問若人見罪故問見福故問名為邪問不見罪問不見福問名為正問若人見淨故問見穢故問名為邪問不見淨問不見穢問名為正問若人見是故問見非故問名為邪問不見是問不見非問名為正問若人見親故問見踈故問名為邪問不見親問不見踈問名為正問若人見空故問見有故問名為邪問不見空問不見有問名為正問若人見苦故問見樂故問名為邪問不見苦問不見樂問名為正問若人見聖故問見凡故問名為邪問不見聖問不見凡問名為正問若人見善故問見惡故問名為邪問不見善問不見惡問名為正問若人見施故問見盜故問名為邪問不見施問不見盜問名為正問若人見持戒問見破戒問名為邪問不見持戒問不見破戒問名為正問若人見長故問見短故問名為邪問不見長問不見短問名為正問若人見貴故問見賤故問名為邪問不見貴問不見賤問名為正問若人見得故問見失故問名為邪問不見得問不見失問名為正問若人見邪故問見正故問名為邪問不見正問不見邪問名為正問若人見問故問不見問故問名為邪問不見問問不見不問名為正問如是等類皆有邪正邪正所有皆從心生心之所生皆是顚倒非有見有非無見無非生見生非滅見滅非住見住非壞見壞非罪見罪非福見福非淨見淨非穢見穢非是見是非非見非非親見親非踈見踈非空見空非有見有非苦見苦非樂見樂非聖見聖非凡見凡非善見善非惡見惡非施見施非盜見盜非持見持非犯見犯非長見長非短見短非貴見貴非賤見賤非得見得非失見失非邪見邪非正見正非問見問非見見見如是諸見皆悉虛妄如幻如夢死一真實何以故諸法無心有心見法名為邪見若人能知諸法無心不起心見是名正見是當知有心問者皆為邪問無心問者乃名正問以是義故我今不令一切衆生斷滅煩惱而得真相但欲度諸妄想衆生故說煩惱真相二義實無生死可得真相所以者何諸法清靜本無二相無所往來是故我今不令衆生斷滅煩惱乃得真相雖說煩惱實無煩惱之可斷滅雖說常樂亦無常樂之可欣慕既無煩惱是故衆生不失真相既無真相是故我今不捨煩惱若復有人於末世中能發此念體解正真是名大乘修真正行於是普等聞斯說已心大歡喜告諸大衆無億數人同體無為俱入正真爾時聖行大士白天尊言於未來世若有衆生於諸法中生有見心是則大道永沒不行於世若見三清是清淨境心所欣慕如此人者永劫修功不得解脫所以者何三清境界名為寂滅逺離諸塵不受諸愛若有見心則墮邪見非修正行名為永失無上法邪於是天尊歎聖行言善哉善哉實如所言聖行真士宿植德本明了實相通達無礙故於今日為衆决疑真為深要若復有人於諸法中生有見心捨於穢土求三清樂捨衆生身求真道相欲斷煩惱而入無為求離諸見乃得寂滅如是等相我說此人名大邪見憎慢之人譬如愚人畏於天地而欲走避所至之處不離大地衆生亦爾畏生死身疾捨三界有心厭離所得之身不離生死如是衆生未能見法求真道相深實可哀真道相者名為不作無所起滅非有非無非長非短非大非小非色非心能體此相名為修習真道正行語聖行世間衆生無明障重真道在身莫能覩見譬如愚人東西馳走覓虛空色而不能見即色是空一切世間亦復如是心性馳騁欲求真道不知身心即是真道譬如愚人但見竹木而不知火捨木求火而不知火巳在木中一切世間亦復如是捨身求道而不知道已在身中捨木求火譬如愚人捨形求影捨聲求響而不知形是影根聲為響本以是當知世間邪見煩惱熾盛猶荆棘林如蒺梨園不可親近汝等今衆乘我今日宣示將來令知三清不離煩惱令知大道不在他方但觀身心修習正行自然解脫永離煩惱常處三清子善思惟自然安樂於是聖行又復白言大德天尊云何說言一切衆生即是真道而復告命修習正行乃得安樂若其是道何須修習猶如羽鳥何須習飛譬如鱗族何須習水雲升雨降不關習學若諸衆生已是真道何須修習而得安樂願為解說得釋所疑天尊告曰聖行真士善哉斯問如我向言真道衆生如木中火非一非異非即非離即木有火而木非火離木無火而火非木木非是火故云非一火不離木故云非異以是當知衆生真道非一非異非即非離即生有道而生非道離生無道而道非生生非是道故云非一道不離生故云非異以是當知若欲求火於木中求不於氷中求若欲求道於身中求不於他求於氷求火他方求道假使力能移山功能竭海力之彌勤功之殊妙終劫行之去道愈逺是故我今告諸衆生若欲求火當須人功備其鑽具運動力手然後見火衆生學道修習正行亦復如是當以善功備其種智觀此身中運動心神然得見道以是之故我令衆生修習正真乃得安樂習空鱗水亦須運用而得升降空行水去真道衆生不以為類雲升雨降無識無心不關習學如斯等類並是世間不比真道子善思惟自當得解於是聖行又復白言大德天尊衆生求道於身中求不於他求身中空邪他方有邪天尊答曰聖行真士三十六問名為邪見聖行又問大德天尊見木有火見氷有水見氷無火見木無水邪天尊答曰聖行真士為諸未悟隨順世間聖行又問大德天尊氷有火耶木有水耶天尊答曰聖行真士於虛空中見衆色像聖行又問大德天尊於氷求火於木求水斯見處邪天尊答曰聖行真士見身求道滅諸有為求得解脫斯非是處若求真道但自觀身若求虛空但觀諸有觀身實相道從身生亦從心生從眼耳生從鼻舌生從四大生從百體生觀物真相空從天生亦從地生亦從我生亦從他生從水火生從草木生從十方生從萬物生以是義故我說此經度微塵衆而未嘗見有一衆生得受度也何以故我眼既空衆生亦空空無分别分别空故是故我眼智慧眀淨能觀一切通達無礙觀諸三千大千世界過去未來一切衆生悉已受度以是因緣我說空中具足一切無量色像於是聖行并諸大衆聞說要言俱起作禮而說偈言具足一切智善哉奇特尊說今微妙法邪正甚分明顚倒生取捨正真非有無心法非本有有心虛妄生善巧順諸有有滅齊正真正真無復相煩惱實本空衆生不異道諸見悉無為有心欲除斷大行永不行三清非逺妙滅在胸襟若起有心見惠牙永消摧天尊說此類名為憎慢人猶如畏大地疾走欲藏身縱日馳千里非地不容身厭身欲求道見道不忘身存身去道逺生死反成親至真無起滅大道離斷常若有體斯妙名為修正真衆生由障重失道唯見身將身欲求道觀色不知空譬如愚見木不知火所從影響非殊逺形聲是本源邪見生煩惱蒺䔧荆棘藂有見生毒害傷身何異斯三清即煩惱大道諒我身猶如木中火鑽具及人功積善求真道安樂會正真說經度一切算數不能量照本元來去受度悉虛陳虛空諒無際衆生何所依我眼本清淨通達了大千未來及過去見在盡微塵久於無量劫悉已會正真大乘妙林經卷上
