  text: 大乘妙林經卷中典二
  hash: sha256:653652ae4c240b07aee9ca995f2450421b6c384daf9c3444d7bf219de9e04f50
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0207_HFL_002-001a, image: hfl/1049/1049-054.png}
body:
  text: 觀身品第四爾時大慈真人即從座起稽首禮問白天尊言我等今衆心自念言天尊所説微妙難思煩惱真相性無差别其義幽微我今等衆親承聖旨得釋所疑將來衆生心根未悟聞此大法云何得解天尊所説三清非遠道即我身一切衆生聞身有道未了斯義益加疑網當以何法得釋彼疑令諸衆生泰然安樂天尊答曰善哉善哉大慈真士於無量劫荷負一切衆生苦惱故於今日善發斯問子今復座吾當為説令諸將來有心之人使得安樂若有衆生入我法門聞我妙義未能曉了當以三法安慰其心令得開悟何謂三法一者若有衆生聞此大乘未能信受當以五戒修攝其身令無放逸五根明淨體性調和於法無畏堪任聽受二者若有衆生聞此大乘未能善解當以三定繼録其心令無動應心地端靜性氣調和於法無畏堪任誦持三者若有衆生聞此大乘未能通觀當以六慧遍被身心令無障礙內外明淨身意澄清慧洞虛空了見真性於法無畏堪任寄付何謂三戒一者若有眼根貪著色塵當以妙林大戒觀彼色塵隨時遷易念念無常無可貪著觀我眼根與彼無異二者若有耳根貪著聲塵當以妙林大戒觀彼聲塵隨時遷易念念無常無可貪著觀我耳根與彼無異三者若有鼻根貪著香塵當以妙林大戒觀彼香塵隨時遷易念念無常無可貪著觀我鼻根與彼無異四者若有舌根貪著味塵當以妙林大戒觀彼味塵隨時遷易念念無常無可貪著觀我舌根與彼無異五者若有身根貪著法塵當以妙林大戒觀彼法塵隨時遷易念念無常無可貪著觀我身緣與彼無異何謂三定一者若有衆生心神馳動多所貪著當以妙林大定觀諸世間如幻如夢如焰如電非真實有既知非有心不馳動是名安定二者若有衆生心神馳動多所愼恚當以妙林大定觀諸世間如聲如響如霧如雲非真實有既知非有無所瞋恚名為法定三者若有衆生心神馳動多有癡慢當以妙林大定觀諸世間如風如空如泡如影非真實有既知非有無可癡慢名為決定何謂六慧一者既了彼色隨時遷易念念無常無可貪著眼根清淨名為見慧二者既了彼聲隨時遷易念念無常無所貪著耳根清淨名為聞慧三者既了彼香隨時遷易念念無常無所貪著鼻根清淨名為通慧四者既了彼味隨時遷易念念無常無所貪著舌根清淨名為辨慧五者既了諸法隨時遷易念念無常無所貪著身緣清淨名為覺慧六者既了三毒隨時遷易念念無常無所滯礙心根清淨名為洞慧大慈真士若後末世一切衆生欲入法門當以三法安定其心令無所畏既無畏已自然安樂身心堅固常住不動六慧明淨通達無礙觀諸世間無非妙相以是當知不斷煩惱而得真相汝等今衆勿以此法輕示非人一念疑毁萬劫不生愼之愼之爾時遍通真人白天尊言我等今衆得聞大法身心踴躍快樂安穩得無所畏不可思議猶有疑昧未敢咨陳伏願天尊特垂聽許天尊告曰遍通真士有所疑網恣汝所問吾當辨説以示未聞於是遍通白天尊言大德法王云何説言若有衆生欲入法門當以三法安慰其心令得安樂一切衆生本有心邪若是有心心性已定云何説言以此三法安定其心令得無畏若本無心云何得定而今説言以此三法安慰其心令得定邪天尊告曰善哉斯問諦聽諦聽吾當辨説令諸將來得了所疑遍達真士一切衆生心法如生云何一切衆生心法如生一切衆生本有生邪若有生者生從何有一切衆生本無生邪若無生者見有生身汝等今衆見身有邪見身無邪遍通答曰大德天尊我等今衆見身是無何以故前色滅故後色生故天尊告曰遍通真士心法亦爾非有非無念念生滅前心滅故不為後因後心生故不為前果是故我言一切衆生心法如生遍通又言大德天尊既云一切衆生心法如生生法見生生法如心心可見邪天尊答曰遍通真士心法可見欲見心法還如見生生無方所欲見心法亦無方所遍通又言大德天尊既云心法如生俱無方所云何安慰令得安樂天尊答曰遍通真士身可安邪遍通答言大德天尊身法念念不可安慰天尊告曰遍通真士心法亦然不可安慰遍通又言大德天尊既不可安云何向言安慰其心令得樂邪天尊答曰遍通真士為見有身故令安慰既安慰已知心非有亦復非無非有非無名得真心故得安樂是故我今以此三法安慰其心令得安樂是諸大衆聞天尊説咸皆開悟同聲稱善而説偈言法王三界大悲尊見身端坐不思議為衆演斯微妙法開悟群生無上因故知煩惱同真相了達道場等無明初學心中未清靜大慈方便啓重昏故得天尊為敷演妙林三法曉初心五戒觀身五根靜三定攝心三毒除一乘遍被三千土六慧重修九夜清了悟幻夢非真有非真有法亦非空故得住居安樂土非空幻有悉常存常存非離人間土人中妙相甚奇姿昔日未悟名煩惱今辰大覺號真仙一體兩名隨物見好見兩名同一身遍通至真無上士懷念殷勤不離心請問衆生所生得有心無心定云何今蒙大悲無上訣衆生有心心若生生法非無亦非有有心非有亦非無前生後生不相續有心無心不相因見身非有同心法求心非無如見身能知身心非一異豈執身心定有無説去兩偏無所兩又忘一中何所中偏中了然無所有重玄微妙不思議故得身心可安慰真心萬劫永常存爾時天尊聞諸大法説偈頌已告諸真人汝等大衆於此座會深解法相快樂安隱誠如所言真實無異於將來世咸令衆生皆得開悟是時大衆咸皆歡喜稽首受命同時而退童子間品第五爾時侍座童子名曰慧明從座而起整頓衣冠稽首作禮上白天尊言大慈天尊微妙光明普照十方微塵世界一切國土諸真聖衆無億數人俱來集會不思議城土地平正宫殿希有容微塵衆無有迫迮此地何緣而有斯妙衆真行業修何功德遇值寶光得入斯座希有難思聞此妙林快樂無極願垂告誨開悟將來於是天尊歎童子言善哉善哉慧明童子善能激發微妙因緣使將來世得釋所疑不思議山名大福堂出離生死國土清淨非是二乘所能覩見過去未來三世天尊之所集會一微塵土容八萬衆不可思議宫殿床榻百味甘香衣服卧具花果林木通身浴池皆是七寶若有所須應念而至福德之土不可思議非我今日言所能盡十方國土三千世界一切微塵無鞅數衆真人集會皆是上士純一無二智慧圓明了諸法性於無量劫植衆德本故於今日遇值光明而得集會見我今日微妙大乘宣通法教普度無量一切衆生得聞此經妙林名字一章一句當知是人塵沙身分所有三業造諸過惡皆悉清淨不復受報若有衆生聞此經名及以誦念一章一句其人所生常居淨土衣食充足無所乏少聞此經已不墮三惡刀山劎樹銅柱爐炭寒氷鐵床一切苦報自然摧滅所經行處常居快樂兵災毒獸不能傷害童子又問大德天尊願為廣説真人所行觀諸法性以何心力而得自在通達無礙復遇尊經聞微妙法天尊告曰慧明童子真人所行於諸法中無所希望心性滅故觀諸色法不生貪著知眼空故聞諸音聲不生貪著知耳空故嗅諸香氣不生貪著知鼻空故餐諸美味不生貪著知舌空故持諸寶物不生貪著知手空故行諸平地不生貪著知足空故見諸天堂不生娛樂知無我故見諸地獄不生怖畏知無苦故見人施與不生歡喜知無得故見人劫奪不生瞋怒知無失故見人讃歎不生欣悅知無譽故見人毁辱不生恚恨知無損故見玉京山不以為高無長相故見諸堆不以為卑無短相故見諸騫樹不以為賒無壽相故見諸槿花不以為促無天相故見大羅天不以為遍無大相故見諸毫未不以為細無小相故見諸猛火不以為熱無燒相故見諸渤海不以為濡無濕相故見諸雕畫不以為能無巧相故見諸愚訥不以為頑無拙相故見諸布施不以為難無財相故見諸貪吝不以為惜無慳相故見諸衆生不以為異無有相故見諸虛空不以為一無無相故見諸親族不以為戀無愛相故見諸怨家不以為惡無憎相故見諸天地不以為久無住相故見諸電光不以為疾無去相故見日初出不以為東無出相故見日終沒不以為西無沒相故無西無沒無日沒故無東無出無日出故以是當知真人見法而不見故以不見故故於今日得居淨土值希有光聞我今日演説大乘微妙經典能以一心信解受持爾時侍座童子名曰善信從座而起稽首作禮一心瞻仰白天尊言大德天尊所説甚深微妙難思若有衆生聞斯法者以何心力而得開悟天尊告曰善信童子若有衆生得遇斯經未能善解當以慧心觀察其身眼耳鼻舌一切諸根為是有邪為是無邪為有因邪為無因邪若言有我眼耳諸根因四大生而有我者當自思惟四大性空云何得合若四大空合成我身身從四大四大既空我身亦空何以故由本空故若言我身眼耳諸根因四大生四大性異云何得合若四大異合成我身身從四大我身亦異何以故由本異故若言我身眼耳諸根因四大生四大非合去何我身四大合生四大非合合生我者虎鹿蛇鼠性非合故云何合生以是當知我今身者如風如影如露如電如幻如夢如聲如響畢竟滅了無因故能知是見名為法觀以此心力能生無量諸功德門住於三清常居淨土能於諸見心無起動以一慧心觀諸萬類悉皆清淨善信童子得聞是已心生歡喜歎未曾有於是天尊而説偈曰我今所演説一切諸天尊過去及未來皆同一心力十方微塵土所有諸法王俱演微妙義一乘無上經若有一人聞一章一句偈誓心欲奉持宣通未來世如此善男子及以善女人所在經行處災疫不敢傷若有一心念五苦盡消摧又請説真士所行奇特因真人所得法觀身知悉空苦樂無二相憎愛悉齊同高卑無異趣大小不殊形日出非初合日沒詎終亡東西無定所出沒亦無方又問何心力得斯平等觀示以慧觀法支節並消融四大性非合虎鹿不同群以是知虛幻露電盡皆空畢竟無起滅法觀心日明常居清淨土長樂永未央是時侍座童子諸來大衆聞天尊説微妙偈頌歡喜踴躍歎未曾有於是大衆一時稽首同聲稱善作禮而退隨順品第六爾時天尊告遍通言於末世中若有一人解我所説稱揚妙義宣示未聞令得了悟能體深義不隨文字知諸法性無可貪著當知是人已於無量無邊諸天尊所種植善功久已成辨世間人民於其人處供給供養衣食卧具香花燈燭資身藥餌諸所之無隨順給與能如此者所得功德與我所資功德無異何以故如是人者即是大乘無上法牙紹隆法藏令無斷絶其人前身曾入寶城聞我大乘微妙經典託生下土宣我正教是故我説供養此人與我無異何以故是人深知我之妙趣隨冝説法無所執滯是故世間供養是人功德無量遍通白言大德天尊何謂隨冝順衆生説無所執邪天尊告曰遍通真士我所説法隨順衆生説一乘經説三世法説有為法説無為法説人間法説出世法説穢濁法説清淨法説罪説福説苦説樂説因説果如是等説名為隨順衆生世間猶如幻師所作幻術無有決定又如夜夢所有見事皆悉虛妄無有真實若有衆生深達斯義如此之人是我真子堪任委寄秉持法藏令無斷絶遍通白言大德天尊所説要妙隨順世間無有決定無罪福邪無苦樂耶天尊答曰遍通真士我所説法隨順衆生説罪為福説福為罪説苦為樂説樂為苦是故我所説法無有決疑遍通白言大德天尊何謂説罪為福説福為罪説苦為樂説樂為苦既無決定一切衆生云何修習出離生死得真解脫天尊答言遍通真士我所説法説罪為福一切衆生所作衆罪罪性本空無所有故説福為罪一切衆生所作之福有心希望貪著福故乃至苦樂因果諸所説法亦復如是以此當知我説罪福苦樂因果亦無決定若人能知諸法不定心無所繫無所繫故名得解脫不復往來生死六趣常樂清淨安住不動是名隨宜順世間説隨宜説者汲引衆生無有決定以不決定令諸衆生得入定位無所怖畏能入三界為衆導師度脫一切無量衆生得入常樂爾時遍通又復白言大德天尊我自思惟我等大衆聞説妙義心中了然無復疑惑於將來世有諸衆生聞斯深奧未能決了天尊所説罪福苦樂無決定相皆是隨順世間衆生以何心力而順世間無決定相天尊答曰遍通真士我今所説以大悲心熏修一切隨順世間所説文字言辭章句皆是方便隨方引接令得度脫有為虛妄無明苦惱曉了法性得見正真是名隨順衆生隨宜説法遍通又問大德天尊何以於諸衆生而起大悲無虛妄邪天尊答曰遍通真士譬如有人問覓虛空我今説空是虛妄邪遍通答言大德天尊如是説空空可説耶天尊答曰遍通真士空不可説我今説空虛空既空我説亦空以是當知世間虛妄本無所有我説世間不墮虛妄何以故虛妄性空我説虛妄説妄亦空是故我説不墮虛妄遍通白言大德天尊所説世間一切皆空隨順衆生有何利益天尊答曰遍通真士為化引故得出離故入空門故滅諸見故了無相故明無作故一切諸行畢竟寂滅永不復生既不生滅常住不動是故我今以大悲心隨順世間令諸衆生得此大利爾時德滿真人即從座起稽首禮問白天尊言大德天尊云何真人於世間法心無所著天尊答曰德滿真士善哉斯問汝今等衆於意云何德滿答言大德天尊我自思惟真人所行心性寂滅無二相故若有二相即是虛妄我今觀法聞善不喜聞惡不怒無愛憎相心性滅無所希望觀諸世間猶如幻師見所幻事知此非真無所貪著真人所見一切世間諸有為法亦復如是知悉非真無所貪著是時侍座童子名曰上相聞真人説心大歡喜踴躍無量言不能盡猶如長者亡所愛子已經數日忽然更活我今得聞真人説法歡喜亦然猶有疑昧未能自了前進稽首白真人言大德真士所説真人觀世間法無有二相無二相故無所貪著若有貪著即是虛妄虛妄法者猶有夢幻既非真有假使虛妄有何失耶真人答曰上相童子善能問我令諸將來得釋所疑我今所説若有衆生於有為法多生貪著即是虛妄虛妄心起即有二見若有衆生能了二相二相無二當知此人所見虛妄亦無虛妄是故我今所説法言若有二見貪著世間即是虛妄無二見者觀諸虛妄悉非世間既非世間即無二見無二見故亦無虛妄以是當知了虛妄者觀諸世間實無所失上相童子又復問言大德真士所説虛妄由有二見貪著世間皆從心起未了世間及以心法何者為因以何為果為是心法能生世間為是世間能生心法若無心法誰取世間若無世間心何所取若云心法能取世間未有心法應無世間若云世間心有所取未有世間應無心法如是二義實未能了願垂辨釋開示未聞真人答曰上相童子吾今語汝心法世間非因非果非前非後非一非異非有非無而亦有無亦是一異乃至因果譬如雞母能生雞子猶如雞子復生雞母如是母子非因非果非前非後非一非異非有非無而亦有無亦是一異乃至因果若了無生無如是問若有所得名為邪問邪問之人永失無量大乘知見上相童子云何於空谷響而求生相於焦穀中而求牙相心法世間亦復如是畢竟永滅不可論説如大毒藥不可得嘗如盛猛火不可親近説世間相及説心法如盲説色如聾説聲畢竟無因不可論説爾時天尊歎德滿言善哉善哉實如所言善能分别心法世間二無所有俱不可説深實要言於是大衆聞斯語已心大歡喜而説偈言妙哉奇特尊開發如是問若有一人聞解了深妙義宣通此大法開示悟將來當知此大士已種無量功世間一切衆當於是人處供給所乏須功德量難思解此深奧義是我真法子紹隆妙林典能資無上才了我隨冝説苦樂本無因猶如大幻師見所為幻事雖順人間法慧心了無緣汲引諸衆生決定入大乘達了世間性解脫無殊殃我今説世間不墮於虛妄問空求色像辨空亦隨機德滿真大士為衆問行心既蒙無上質自陳昔所行雖順世間法所見無虛妄上相真童子未了達所疑真人善通釋氷結並消融心性世間法非果亦非因能知盲説色虛谷豈勞陳天尊歎真士大衆悉披襟爾時不思議城同聞大衆説偈頌已白天尊言大德天尊唯願大慈不捨弘心賜大光明照於下方無量世界令彼下士得見寶光開諸愚暗與道結緣令道反本於是天尊舉手彈指無上寶光如鏡之圓從掌中出徹照下方無量國土乃至三徒惡趣九幽苦魂皆得眀朗了了清淨地獄休息報對寧間聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切衆生舉眼遙見不思議城如看掌中無有遺失見斯光者必當得往長樂福堂入寶城中快樂無極大乘妙林經卷中
