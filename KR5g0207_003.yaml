front:
  text: 大乘妙林經卷下典三
  hash: sha256:b8eaf1a11311b6ff43105c94c3136ee36263ccd78f6d760fc6098738a22e2a8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0207_HFL_003-001a, image: hfl/1049/1049-092.png}
body:
  text: 衆真說法品第七爾時侍座童子名曰善見即從座起稽首禮問白天尊言今日侍座得聞希有微妙經典身心踴躍快樂難言天尊所說譬喻甚深非是二乘所得聞見善哉斯座昔未曾經諸微塵土一切衆真皆得集會此諸大士何以心力觀諸法性而得值遇微妙尊經願為開示真人所行觀諸法性令諸衆生皆得開悟爾時天尊歎善見言善哉善哉侍座童子乃能為諸將來衆生請我開演真人所行觀諸法性於是天尊告諸真人汝今等衆遇我今日微妙光明而得集會不可思議汝今等衆皆悉上士純一無雜明了法性童子所請願我廣說真人所行以何心力故於今日得聞要說微妙大乘第一希有奇特妙義汝今等衆冝各顯說真人行相令諸童子及將來世一切衆生得了真人所行祕要大乘密行爾時真人名曰妙相告諸童子等今衆一心諦聽我等衆真欲為廣說真人所行觀諸法性而得要妙開示未聞令得了悟真人所行受諸禁戒一切威儀猶如世間諸善男女一時聞法心意踴躍無所疑惑生决定心真人亦爾從昔以來至無量劫於其中間所持禁戒一切威儀心意踴躍無所疑惑生决定心無復違退是名真人所行禁戒觀諸法性生决定心寶光真人告童子言善見童子若諸真人所行之法四無等心堅固不退是名真人觀諸法性得决定心曜明真人告童子言善見童子若諸真人觀一切法决定皆得成無上道是名真人觀諸法性得决定心普等真人告童子言善見童子若諸真人導引一切無有偏愛生一子想是名真人觀諸法性得决定心聖行真人告童子言善見童子若諸真人於正行中心無動念觀諸色相無有異性是名真人觀諸法性得决定心大悲真人告童子言善見童子若諸真人入於苦難濟拔衆生心無違退是名真人觀諸法性得决定心遍通真人告童子言善見童子若諸真人心自思惟觀諸衆生無非真實是名真人觀諸法性得决定心德滿真人告童子言善見童子若諸真人於諸法中了辨無礙降伏外道令人正真是名真人觀諸法性得决定心敏濟真人告童子言善見童子若諸真人如一切性本來清靜不可思議是名真人觀諸法性得决定心導師真人告童子言善見童子若諸真人身口心意導引衆生無有虛妄是名真人觀諸法性得决定心善愛真人告童子言善見童子若諸真人觀一切法皆悉真實無非真道是名真人觀諸法性得决定心達相真人告童子言善見童子若諸真人於諸魔衆皆來惱害心不瞋恚是名真人觀諸法性得决定心高上真人告童子言善見童子若諸真人見諸衆生墮在生死心無所樂是名真人觀諸法性得决定心勝慈真人告童子言善見童子若諸真人以無上心濟度衆生皆得成辨是名真人觀諸法性得决定心開明真人告童子言善見童子若諸真人受諸禁戒心無違退是名真人觀諸法性得决定心守藏真人告童子言善見童子若諸真人見諸寶物心無所愛著常樂供養是名真人觀諸法性得决定心護持真人告童子言善見童子若諸真人於五欲中心無所樂常修淨行是名真人觀諸法性得决定心等觀真人告童子言善見童子若諸真人觀諸衆生不見生相不見滅相是名真人觀諸法性得决定心寂定真人告童子言善見童子若諸真人知諸衆生得聞此經决定成道是名真人觀諸法性得决定心無礙真人告童子言善見童子若諸真人以功德香常流五道無有滯礙是名真人觀諸法性得决定心凌空真人告童子言善見童子若諸真人見諸發心必定當得超升寶城是名真人觀諸法性得决定心常念真人告童子言善見童子若諸真人見諸衆生念令開發心無休息是名真人觀諸法性得决定心善變真人告童子言善見童子若諸真人知世間法無有住相亦無去相是名真人觀諸法性得决定心靜定真人告童子言善見童子若諸真人為衆說法不生法想是名真人觀諸法性得决定心妙光真人告童子言善見童子若諸真人能以智慧滅無量罪是名真人觀諸法性得决定心妙花真人告童子言善見童子若諸真人見諸天尊功德寶樹滿十方土是名真人觀諸法性得决定心大慈真人告童子言善見童子若諸真人見衆生苦心不逺離是名真人觀諸法性得决定心惠明真人告童子言善見童子若諸真人見有愚癡示以除斷是名真人觀諸法性得决定心寶蓋真人告童子言善見童子若諸真人以無為覆護一切令得安隱是名真人觀諸法性得決定心爾時侍座諸童子等無鞅數衆聞諸真人所說微妙真實大乘要妙深遠皆各開悟同時稱善設禮而退觀法性品第八爾時度命真人即從座起稽首禮問白天尊言如向所說真人所見觀諸法性心無希望知法空故如是見者云何莊嚴一切衆生令得道邪天尊告曰度命真士一切衆生性本情淨無所有故同虛空故道性亦空道性空故云何問言一切衆生云何得道衆生道性無有二相衆生性者即是幻性諸幻性者名為法性於法性中無得無失無增無滅是故我言一切衆生不斷煩惱而得真相度命真人又復白言大德天尊若如所說一切衆生不修行願自然安樂天尊告曰度命真士於法性中有修行願而得樂邪所謂安樂皆從心生心性本空云何修行若有安樂名為有欲知諸法空乃名安樂真人又言大德天尊既諸衆生性本空云何說言一切衆生無量劫中修諸功德會不思議得居淨土天尊告曰度命真士譬如愁人心意昏亂煩毒熱悶於此人前設諸幻術木男木女木牛木馬羅列施張作諸戲術愁者見之生牛馬想息諸煩惱心意泰然我今亦爾一切衆生虛妄愁毒未能安樂是故我說修諸功德無量無邊乃得往生不思議土若知虛妄本無所有一切衆生舉足行步諸所作為悉不思議若知清靜自在無礙心所求願恣意充足若有修善當得往生三清妙土如此方便止彼虛妄而實未曾有彼三清常樂境界之所希望若欲速得三清寶城常樂淨土當以乘大無上惠心觀我身相從無量劫因何法生既知無因乃知無我以無我故是故我身常在三清常樂淨土爾時度命真人又復白言大德天尊一切衆生性命空寂虛妄無實皆如幻夢無决定故如是一切諸善男女不斷三業不行六度不修四等而得道邪天尊告曰度命真士云何復作如是問邪一切衆生所有三業名為不淨口業身意無所從故假使能修猶是虛妄云何虛妄三業本淨何所因修既有所修由有不淨譬如病重迎諸醫藥善療衆病價直千金緣路迎接雖到宅舍終非藥具又如狂人雖說空花論其微妙終不可信一切衆生修身求道亦復如是修身求道具有二患何謂二患一者由有惡故二者見有身故如是二見道之大病是故衆生若欲求道當以大乘無上惠心觀我身相既了無身三業自淨修六度行行四等心是名隨順方便引接譬如行客隔礙暘谷欲往彼岸無因得過假借舟航以濟沉溺既至彼岸向之舟航無所復用六度四行亦復如是為諸衆生未能體了無生道岸是故假借六度安慰其心令得調伏即了無身得致道地六度諸行無所復用度命又言大德天尊所說譬喻要妙深逺一切衆生所修衆行以求度世既得度已無所復行如是一切成真得道無所行邪既無所行應失大悲云何大道於諸衆生常行四弘以度衆苦天尊答曰度命真士天尊大聖濟生度苦無彼此故無愛憎故無成壞故無得失故譬如橋船無心度物不揀淨穢是人非人牛馬騾驢皆悉通過天尊大聖無心大度亦復如是雖度衆生無彼此相無愛憎相無成壞相無得失相猶如大海容納百川無增無減無穢無淨無心揀擇含容一切金銀珠玉水晶琉璃硨磲碼瑙珊瑚琥珀一切珍寶無不包藏真道大藏亦復如是大羅三清四梵三界天人五道仙真大聖無不容納以是之故無心常足不修諸行無去來相度命真人於是歎言大德天尊所說微妙不可思議我所聞法踴躍歡喜無量無邊非是二乘所得聞見於是真人同時稽首而說偈言善巧奇特無上尊所說微妙大乘經能為時衆演斯義一切性空不生滅道性衆生本無二不假修因自然得法性幻性有異名清淨寂滅無殊致昔來我等實憂悲不斷煩惱非真性始於今座得未曾聞斯大乘微妙法乃知衆生本空寂常樂自於無量劫起有欲心修衆行不知行空本無修大聖方便說修行譬如幻師設戲時木牛木馬自愁人人愁木馬俱虛妄知妄本無顚倒有即有顚倒不思議所說三清微妙土方便引接使歸真了達無因無我相即我本土是三清能知我身是幻夢六度四等並虛陳假使能修無漏失終是虛妄有心為譬如重病迎醫藥絡非藥具悅人心一見未能齊無相假使舟航渡險流得道成真心行滅忘心度物諒無涯大海懷含無量寶真道容藏一切珍我等聞今無上法欣斯三界是道場爾時大衆說斯偈巳不思議城無量大衆一時歡喜各還本座淨慧品第九爾時正見童子白真人言度命真人云何說言真人所行於愛欲中心無所染不染無欲是名真人觀諸法性得决定心真人見諸愛欲有所見邪有所行邪真人答言正見童子善哉斯問真人所見諸有為法譬如智人見熱時炎如大幻師見所幻事知非真故心無所望真人所見諸有為法亦復如是真人所見同衆生見衆生所見異真人見云何為同真人所行同衆生行衆生所行即是十方天尊得道成真之所知見云何大道同衆生行衆生所行即是空義真人所行行道行處是故真人所行同衆生行云何衆生所見異真人見衆生所行有所行故有所分别虛妄見故以虛妄故心有所著有所著故所見不同是故衆生所見異真人見童子又問大德真士真人所見當見何法而得决定真人答曰正見童子真人所見不見有為不見無為諸有為法皆悉虛妄知虛妄空無所分别是名真見無為法者本來清淨無所有故亦無所見能了二見是名淨慧觀諸法性一切皆空是名真見真見明淨是名淨慧是故真人於諸法中得决定心無所見故童子又問大德真士如是說者一切衆生有所修習無所得耶真人答曰正見童子何言此耶一切衆生若有能知無因無果無行無得是名因果是名行得若起諸見有所得心是名邪見不可親近無行無得是名正行真人所行無所得故譬如明鏡照衆色像了了明淨無所障蔽而此明鏡終不自言我能明照妙林淨慧寶城集會諸微塵土一切衆真心鏡明淨無所得故照一切法了了明淨無有障礙而諸真人終不自言我能明照如彼明鏡等無有異又如清水照百千月性俱明故真人所見亦復如是觀諸世間所有物處無非清淨性俱空故童子又問大德真士一切世間既無所有天尊出世無利益耶真人答曰正見童子何於無法中而有利耶汝今所見十方天尊有生相耶童子答曰大德真士我今所見無有生相知諸法空本來清淨是故天尊出現於世而無生相真人又言正見童子十方天尊出現於世為欲斷諸衆生虛妄說此妙經深邃之法令諸衆生各得淨慧明了法性無所障翳知諸法空本無虛妄虛妄既空心性清淨乃知十方一切天尊無出沒相以是之故十方天尊出現於世得大利益一切衆生皆得正見泰然安樂譬如夜夢見諸毒蛇開張牙齒近來逼身擬欲吞噬心神惶懼東西馳走呌聲烈天迷悶躃地床邊覺人咄哉睡夢何所呌耶而其夢人忽然睡覺伸舒手足乃知夢見虛妄真非心意正定泰然安樂一切衆生同在三界無明巨室諸所為作皆悉夢幻無有真實天尊大聖說此大乘微妙經典覺悟一切令得正見具一切智淨慧圓滿悉得安樂既得安樂巳不生貪著既無貪著即得决定永不入流既不入流則無和合無和合者即無無明既無無明即無諸行既無諸行即是永滅不起諸相畢竟清淨無言無說若有言說即是虛妄言虛妄者即是真實何以故虛妄說者即是文字文字性空即是真實以是因緣天尊所說虛妄之言皆悉真實爾時侍座童子名曰法相前進稽首白真人言大德仁者云何說言若諸真人觀諸法性本來清淨是名真人觀諸法性法性之性有耶無耶法性若有有則定常法性若無無則定空常有之性云何說空定空之性云何說妄性若定空而說妄者是則妄說譬如虛空空無所妄而說空妄是則妄說非空有妄性若定有云何說言若諸真人觀諸法性本來清淨是名真人觀諸法性得决定心定有之性而說空者是則說空非法性空法性非空而說空者亦是虛妄說法性空性本非空云何觀法而得决定如是二義實未能了願垂辨釋使諸衆等得了所疑愍濟真人告童子言法相童子善哉斯問我今所說觀諸法性本來清淨云何問言法性之性有邪無邪性若定有所有之法不可說空性若定空所空之性不可說有若見性有即是常見若見性空即是斷見如是二見即是邪見三十六見非正真見我今所見法性真性非有非無非常非斷非生非滅非白非黑非青非黃非長非短非高非下非一非異非大非小非泠非熱非前非後非因非果以是義故我說真人觀諸法性本來清淨無所有故雖言非有亦不定空雖說非空亦不常有不定有故法性非常不定空故法性非斷法性非斷不如兔角法性非常不若虛妄以是因緣我說真人觀諸法性本來清淨無所有故譬如燈滅不可尋求畢竟清淨不可得故於是天尊歎真人言善哉真士快說斯義微妙希有真實第一侍座童子無鞅數衆一時開悟是時童子號曰普明於大衆中而說偈言善哉妙林座功德難思議十方微塵衆遇此希有光空行臨妙座純一無上真慧心觀妙法法性自然空世間有為法諸法並非真智者觀虛妄幻師見木人見幻同凡見凡人見異真十方諸大道世界盡衆生俱行第一義迷失謂不然真見了諸法眀觀照微塵天尊見身相諸相本無生說斯微妙典衆生悉體空故知三界空夢幻普非真無明既永滅諸行自消融以是知虛幻未曾非道場至真無上士淨慧拯幽沉巧辨諸法性性空非有無常斷本清淨燈滅不可尋天尊歎希有善哉微妙經我等咸開悟俱欣無上心爾時天尊聞童子說偈頌已歎童子言善哉普明久修淨慧故於今日同入寶城聞我大乘咸得開悟體解法性眀了世間性無所有實如所言我於今日快樂安隱無復憂慮汝等今衆於將來世宣我大乘微妙經典令諸將來有心之士咸得開悟同得淨慧無復疑滯了了決淨泰然安樂是時侍座無量大衆一切仙真大力神王俱起作禮受命而退讃歎品第十爾時玉京山中大羅天王號曰高真從座而起聞諸真人所說法相踴躍歡喜即以微妙無量天花散於座上百和寶香熏時衆心不可思議城諸來大衆皆大歡喜於是天王白天尊言我諸大衆以何因緣遇斯希有微妙經典聞諸真人所說法相幽奧難解未曾有法我自思惟若善男女一切衆生聞此大乘微妙經典一章一句能以一心信受奉行讀誦讃歎講說書寫如此之人即是大道真實弟子其人威力能破一切生死魔怨所以者何真人所說真道正性清淨平等無有異相名為悉破一切衆生無量邪見若復有人聞此說者不生疑惑生决定心受持供養為人演說一章一句當知此人於無量劫種植善因故於今生明了法性聞斯大乘微妙經典不生驚怖若人聞此大乘經典未來生中墮三惡道斯無是處聞此經已一見歡喜功德無量當知是人舉足行步諸所為作即是三清常樂因緣此經所在之處即為諸天無量大神之所擁護若有講誦大乘經典所在之處能以一心來詣法座歡喜聽受當知是人已入法輪不思議城此經所在之處城邑聚落山林曠野觀舍壇場經所行處諸魔外道一切惡人不能加害我等今衆得見天尊放微妙光聞斯要說欣喜無量誓心奉持護斯經典不惜身命譬如瞎人唯餘一目護持此目畏有損傷我今護持此大乘經亦復如是畏有損傷不敢輕慢於是天王而說偈言我等無量衆俱入寶城中值光見希有微妙大乘經若有信心者受持此章句此人功德力摧伏一切魔此經所行處諸魔不敢侵聞經來聽受蓮花足下生我等聞斯要誓持不敢違猶如護一目愛惜不令傷我今護尊法憐愛甚於斯願此大乘法普度十天人爾時天尊歎天王言善哉善哉子等今衆真實大乘護度一切是我真子助我弘宣流通末世令諸一切咸得開悟汝等今座乘此妙因於未來劫必定當得至真大道於是天王及諸大衆聞是說巳心意泰然歡喜無量一時稱善作禮而退大乘妙林經卷下
