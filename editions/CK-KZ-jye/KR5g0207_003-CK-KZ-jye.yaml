front:
  text: 天尊歎眞士大眾悉披襟爾時不思議城同聞大眾說偈頌已白天尊言大德天尊唯願大慈不捨弘心賜大光明照於下方無量世界令彼下士得見寶光開諸愚闇與道結緣令道反本於是天尊舉手彈指無上寶光如鏡之圓從掌中出徹照下方無量國土乃至三塗惡趣九幽苦魂皆得明朗了了淸淨地獄休息報對寕閑聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切眾生舉眼遙見不思議城如看掌中無有遺失見斯光者必當得往長樂福堂入寶城中快樂無極天尊歎眞士大眾悉披襟爾時不思議城同聞大眾說偈頌己白天尊言大德天尊唯願大慈不捨弘心賜大光明照於下方無量世界令彼下士得見寶光開諸愚闇與道結緣令道反本於是天尊舉手彈指無上寶光如鏡之圓從掌中出徹照下方無量國土乃至三塗惡趣九幽苦魂皆得明朗了了淸淨地獄休息報對寕閑聾盲六疾一切苦惱皆得歡樂人禽鳥獸皆發善心不相傷害因此光明一切眾生舉眼遙見不思議城如看掌中無有遺失見斯光者必當得往長樂福堂入寶城中快樂無極
  hash: sha256:1587de8d4c4b529ecd6f80cc403331f7d5090fb9b0f12e34a7c00c010a4e1c80
body:
  text: 爾時侍座童子名曰善見卽從座起稽首禮問白天尊言今日侍座得聞希有微妙經典身心踴躍快樂難言天尊所說譬喻甚深非是二乘所得聞見善哉斯座昔未曾經諸微塵土一切眾眞皆得集會此諸大士何以心力觀諸法性而得値遇微妙尊經願爲開示眞人所行觀諸法性令諸眾生皆得開悟爾時天尊歎善見言善哉善哉侍座童子乃能爲諸將來眾生請我開演眞人所行觀諸法性於是天尊告諸眞人汝今等眾遇我今日微妙光明而得集會不可思議汝今等眾皆悉上士純一無雜明了法性童子所請願我廣說眞人所行以何心力故於今日得聞要說微妙大乘第一希有奇特妙義汝今等眾宜各顯說眞人行相令諸童子及將來世一切眾生得了眞人所行祕要大乘密行爾時眞人名曰妙相告諸童子等今眾一心諦聽我等眾眞欲爲廣說眞人所行觀諸法性而得要妙開示未聞令得了悟眞人所行受諸禁戒一切威儀猶如世間諸善男女一時聞法心意踴躍無所疑惑生決定心眞人亦爾從昔以來至無量劫於其中間所持禁戒一切威儀心意踴躍無所疑惑生決定心無復違退是名眞人所行禁戒觀諸法性生決定心寶光眞人告童子言善見童子若諸眞人所行之法曰無等心堅固不退是名眞人觀諸法性得決定心曜明眞人告童子言善見童子若諸眞人觀一切法決定皆得成無上道是名眞人觀諸法性得決定心普等眞人告童子言善見童子若諸眞人導引一切無有偏愛生一子想是名眞人觀諸法性得決定心聖行眞人告童子言善見童子若諸眞人於正行中心無動念觀諸色相無有異性是名眞人觀諸法性得決定心大悲眞人告童子言善見童子若諸眞人入於苦難濟拔眾生心無違退是名眞人觀諸法性得決定心遍通眞人告童子言善見童子若諸眞人心自思惟觀諸眾生無非眞實是名眞人觀諸法性得決定心德滿眞人告童子言善見童子若諸眞人於諸法中了辨無碍降伏外道令人正眞是名眞人觀諸法性得決定心愍濟眞人告童子言善見童子若諸眞人如一切性本來淸靜不可思議是名眞人觀諸法性得決定心導師眞人告童子言善見童子若諸眞人身口心意導引眾生無有虛妄是名眞人觀諸法性得決定心善愛眞人告童子言善見童子若諸眞人觀一切法皆悉眞實無非眞道是名眞人觀諸法性得決定心達相眞人告童子言善見童子若諸眞人於諸魔眾皆來惱害心不瞋恚是名眞人觀諸法性得決定心高上眞人告童子言善見童子若諸眞人見諸眾生墮在生死心無所樂是名眞人觀諸法性得決定心勝慈眞人告童子言善見童子若諸眞人以無上心濟度眾生皆得成辨是名眞人觀諸法性得決定心開明眞人告童子言善見童子若諸眞人受諸禁戒心無違退是名眞人觀諸法性得決定心守藏眞人告童子言善見童子若諸眞人見諸寶物心無所愛著常樂供養是名眞人觀諸法性得決定心護持眞人告童子言善見童子若諸眞人於五欲中心無所樂常修淨行是名眞人觀諸法性得決定心等觀眞人告童子言善見童子若諸眞人觀諸眾生不見生相不見滅相是名眞人觀諸法性得決定心寂定眞人告童子言善見童子若諸眞人知諸眾生得聞此經決定成道是名眞人觀諸法性得決定心無碍眞人告童子言善見童子若諸眞人以功德香常流五道無有滯礙是名眞人觀諸法性得決定心凌空眞人告童子言善見童子若諸眞人見諸發心必定當得超昇寶城是名眞人觀諸法性得決定心常念眞人告童子言善見童子若諸眞人見諸眾生念念開發心無休息是名眞人觀諸法性得決定心善變眞人告童子言善見童子若諸眞人知世間法無有住相亦無去相是名眞人觀諸法性得決定心靜定眞人告童子言善見童子若諸眞人爲眾說法不生法想是名眞人觀諸法性得決定心妙光眞人告童子言善見童子若諸眞人能以智慧滅無量罪是名眞人觀諸法性得決定心妙花眞人告童子言善見童子若諸眞人見諸天尊功德寶樹滿十方土是名眞人觀諸法性得決定心大慈眞人告童子言善見童子若諸眞人見眾生苦心不遠離是名眞人觀諸法性得決定心惠明眞人告童子言善見童子若諸眞人見有愚癡示以除斷是名眞人觀諸法性得決定心寶蓋眞人告童子言善見童子若諸眞人以無爲覆護一切令得安隱是名眞人觀諸法性得決定心爾時侍座諸童子等無鞅數眾聞諸眞人所說微妙眞實大乘要妙深遠皆各開悟同時稱善設禮而退爾時度命眞人卽從座起稽首禮問白天尊言如向所說眞人所見觀諸法性心無希望知法空故如是見者云何莊嚴一切眾生令得道邪天尊告曰度命眞士一切眾生性本淸淨無所有故同虛空故道性亦空道性空故云何問言一切眾生云何得道眾生道性無有二相眾生性者卽是幻性諸幻性者名爲法性於法性中無得無失無增無滅是故我言一切眾生不斷煩惱而得眞相度命眞人又復白言大德天尊若如所說一切眾生不修行願自然安樂天尊告曰度命眞士於法性中有修行願而得樂邪所謂安樂皆從心生心性本空云何修行若有安樂名爲有欲知諸法空乃名安樂眞人又言大德天尊旣諸眾生性木空寂云何說言一切眾生無量劫中修諸功德會不思議得居淨土天尊告曰度命眞士譬如愁人心意昏亂煩毒𤍠悶於此人前設諸幻術木男木女木牛木馬羅列施張作諸戲術愁者見之生牛馬想息諸煩惱心意泰然我今亦爾一切眾生虛妄愁毒未能安樂是故我說修諸功德無量無邊乃得往生不思議土若知虛妄本無所有一切眾生舉足行步諸所作爲悉不思議若知淸靜自在無礙心所求願恣意充足若有修善當得往生三淸妙土如此方便止彼虛妄而實未曾有彼三淸常樂境界之所希望若欲速得三淸寶城常樂淨土當以乘大無上惠心觀我身相從無量劫因何法生旣知無因乃知無我以無我故是故我身常在三淸常樂淨土爾時度命眞人又復白言大德天尊一切眾生性命空寂虛妄無實皆如幻夢無決定故如是一切諸善男女不斷三業不行六度不修四等而得道邪天尊告曰度命眞士云何復作如是問邪一切眾生所有三業名爲不淨口業身意無所從故假使能修猶是虛妄云何虛妄三業本淨何所因修旣有所修由有不淨譬如病重迎諸醫藥善療眾病價直千金緣路迎接雖到宅舍終非藥具又如狂人雖說空花論其微妙終不可信一切眾生修身求道亦復如是修身求道具有二患何謂二患一者由有惡故二者見有身故如是二見道之大病是故眾生若欲求道當以大乘無上惠心觀我身相旣了無身三業自淨修六度行行四等心是名隨順方便引接譬如行客隔礙暘谷欲往彼岸無因得過假借舟航以濟沉溺旣至彼岸向之舟航無所復用六度四行亦復如是爲諸眾生未能體了無生道岸是故假借六度安慰其心令得調伏旣了無身得致道地六度諸行無所復用度命又言大德天尊所說譬喻要妙深遠一切眾生所修眾行以求度世旣得度已無所復行如是一切成眞得道無所行邪旣無所行應失大悲云何大道於諸眾生常行四弘以度眾苦天尊答曰度命眞士天尊大聖濟生度苦無彼此故無愛憎故無成壞故無得失故譬如橋船無心度物不揀淨穢是人非人牛馬騾驢皆悉通過天尊大聖無心大度亦復如是雖度眾生無彼此相無愛憎相無成壞相無得失相猶如大海容納百川無增無減無穢無淨無心揀擇含容一切金銀珠玉水晶琉璃硨磲碼碯珊瑚琥珀一切珍寶無不包藏眞道大藏亦復如是大羅三清四梵三界天人五道仙眞大聖無不容納以是之故無心常足不修諸行無去來相度命眞人於是歎言大德天尊所說微妙不可思議我所聞法踴躍歡喜無量無邊非是二乘所得聞見於是眞人同時稽首而說偈言善巧奇特無上尊所說微妙大乘經能爲時眾演斯義一切性空不生滅道性眾生本無二不假修因自然得法性幻性有異名淸淨寂滅無殊致昔來我等實憂悲不斷煩惱非眞性始於今座得未曾聞斯大乘微妙法乃知眾生本空寂常樂自於無量劫起有欲心修眾行不知行空本無修大聖方便說修行譬如幻師設戲時木牛木馬自愁人人愁木馬俱虛妄知妄本無顚倒有卽有顚倒不思議所說三淸微妙土方便引接使歸眞了達無因無我相卽我本土是三淸能知我身是幻夢六度四等並虛陳假使能修無漏失終是虛妄有心爲譬如重病迎醫藥終非藥具悅人心一見未能齊無相假使舟航渡險流得道成眞心行滅忘心度物諒無涯大海懷含無量寶眞道容藏一切珍我等聞今無上法欣斯三界是道塲爾時大眾說斯偈已不思議城無量大眾一時歡喜各還本座爾時正見童子白眞人言度命眞人云何說言眞人所行於愛欲中心無所染不染無欲是名眞人觀諸法性得決定心眞人見諸愛欲有所見邪有所行邪眞人答言正見童子善哉斯問眞人所見諸有爲法譬如智人見𤍠時炎如大幻師見所幻事知非眞故心無所望眞人所見諸有爲法亦復如是眞人所見同眾生見眾生所見異眞人見云何爲同眞人所行同眾生行眾生所行卽是十方天尊得道成眞之所知見云何大道同眾生行眾生所行卽是空義眞人所行行道行處是故眞人所行同眾生行云何眾生所見異眞人見眾生所行有所行故有所分别虛妄見故以虛妄故心有所著有所著故所見不同是故眾生所見異眞人見童子又問大德眞士眞人所見當見何法而得決定眞人答曰正見童子眞人所見不見有爲不見無爲諸有爲法皆悉虛妄知虛妄空無所分别是名眞見無爲法者本來淸淨無所有故亦無所見能了二見是名淨慧觀諸法性一切皆空是名眞見眞見明淨是名淨慧是故眞人於諸法中得決定心無所見故童子又問大德眞士如是說者一切眾生有所修習無所得耶眞人答曰正見童子何言此耶一切眾生若有能知無因無果無行無得是名因果是名行得若起諸見有所得心是名邪見不可親近無行無得是名正行眞人所行無所得故譬如明鏡照眾色像了了明淨無所障蔽而此明鏡終不自言我能明照妙林淨慧寶城集會諸微塵土一切眾眞心鏡明淨無所得故照一切法了了明淨無有障礙而諸眞人終不自言我能明照如彼明鏡等無有異又如清水照百千月性俱明故眞人所見亦復如是觀諸世間所有物處無非淸淨性俱空故童子又問大德眞士一切世間旣無所有天尊出世無利益耶眞人答曰正見童子何於無法中而有利耶汝今所見十方天尊有生相耶童子答曰大德眞士我今所見無有生相知諸法空本來淸淨是故天尊出現於世而無生相眞人又言正見童子十方天尊出現於世爲欲斷諸眾生虛妄說此妙經深邃之法令諸眾生各得淨慧明了法性無所障翳知諸法空本無虛妄虛妄旣空心性淸淨乃知十方一切天尊無出沒相以是之故十方天尊出現於世得大利益一切眾生皆得正見泰然安樂譬如夜夢見諸毒蛇開張牙齒近來逼身擬欲吞噬心神惶懼東西馳走叫聲烈天迷悶躃地床邊覺人咄哉睡夢何所叫耶而其夢人忽然睡覺伸舒手足乃知夢見虛妄眞非心意正定泰然安樂一切眾生同在三界無明巨室諸所爲作皆悉夢幻無有眞實天尊大聖說此大乘微妙經典覺悟一切令得正見具一切智淨慧圓滿悉得安樂旣得安樂已不生貪著旣無貪著卽得決定永不入流旣不入流則無和合無和合者卽無無明旣無無明卽無諸行旣無諸行卽是永滅不起諸相畢竟淸淨無言無說若有言說卽是虛妄言虛妄者卽是眞實何以故虛妄說者卽是文字文字性空卽是眞實以是因緣天尊所說虛妄之言皆悉眞實爾時侍座童子名曰法相前進稽首白眞人言大德仁者云何說言若諸眞人觀諸法性本來淸淨是名眞人觀諸法性法性之性有耶無耶法性若有有則定常法性若無無則定空常有之性云何說空定空之性云何說妄性若定空而說妄者是則妄說譬如虛空空無所妄而說空妄是則妄說非空有妄性若定有云何說言若諸眞人觀諸法性本來淸淨是名眞人觀諸法性得決定心定有之性而說空者是則說空非法性空法性非空而說空者亦是虛妄說法性空性本非空云何觀法而得決定如是二義實未能了願垂辯釋使諸眾等得了所疑愍濟眞人告童子言法相童子善哉斯問我今所說觀諸法性本來淸淨云何問言法性之性有邪無邪性若定有所有之法不可說空性若定空所空之性不可說有若見性有卽是常見若見性空卽是斷見如是二見卽是邪見三十六見非正眞見我今所見法性眞性非有非無非常非斷非生非滅非白非黑非靑非黃非長非短非高非下非一非異非大非小非冷非𤍠非前非後非因非果以是義故我說眞人觀諸法性本來淸淨無所有故雖言非有亦不定空雖說非空亦不常有不定有故法性非常不定空故法性非斷法性非斷不如兔角法性非常不若虛妄以是因緣我說眞人觀諸法性本來淸淨無所有故譬如燈滅不可尋求畢竟淸淨不可得故於是天尊歎眞人言善哉眞士快說斯義微妙希有眞實第一侍座童子無鞅數眾一時開悟是時童子號曰普明於大眾中而說偈言善哉妙林座功德難思議十方微塵眾遇此希有光空行臨妙座純一無上眞慧心觀妙法法性自然空世間有爲法諸法並非眞智者觀虛妄幻師見木人見幻同凡見凡人見異眞十方諸大道世界盡眾生俱行第一義迷夫謂不然眞見了諸法明觀照微塵天尊見身相諸相本無生說斯微妙典眾生悉體空故知三界空夢幻普非眞無明旣永滅諸行自消融以是知虛幻未曾非道場至眞無上士淨慧拯幽沉巧辯諸法性性空非有無常斷本淸淨燈滅不可尋天尊歎希有善哉微妙經我等咸開悟俱欣無上心爾時天尊聞童子說偈頌已歎童子言善哉普明久修淨慧故於今日同入寶城聞我大乘咸得開悟體解法性明了世間性無所有實如所言我於今日快樂安隱無復憂慮汝等今眾於將來世宣我大乘微妙經典令諸將來有心之士咸得開悟同得淨慧無復疑滯了了決淨泰然安樂是時侍座無量大眾一切仙眞大力神王俱起作禮受命而退爾時玉京山中大羅天王號曰高眞從座而起聞諸眞人所說法相踴躍歡喜卽以微妙無量天花散於座上百和寶香熏峙眾心不可思議城諸來大眾皆大歡喜於是天王白天尊言我諸大眾以何因緣遇斯希有微妙經典聞諸眞人所說法相幽奥難解未曾有法我自思惟若善男女一切眾生聞此大乘微妙經典一章一句能以一心信受奉行讀誦讚歎講說書寫如此之人卽是大道眞實弟子其人威力能破一切生死魔怨所以者何眞人所說眞道正性淸淨平等無有異相名爲悉破一切眾生無量邪見若復有人聞此說者不生疑惑生決定心受持供養爲人演說一章一句當知此人於無量劫種植善因故於今生明了法性聞斯大乘微妙經典不生驚怖若人聞此大乘經典未來生中墮三惡道斯無是處聞此經已一見歡喜功德無量當知是人舉足行步諸所爲作卽是三淸常樂因緣此經所在之處卽爲諸天無量大神之所擁護若有講誦大乘經典所在之處能以一心來詣法座歡喜聽受當知是人已入法輪不思議城此經所在之處城邑聚落山林曠野觀舍壇場經所行處諸魔外道一切惡人不能加害我等今眾得見天尊放微妙光聞斯要說欣喜無量誓心奉持護斯經典不惜身命譬如瞎人唯余一目護持此目畏有損傷我今護持此大乘經亦復如是畏有損傷不敢輕慢於是天王而說偈言我等無量眾俱入寶城中値光見希有微妙大乘經若有信心者受持此章句此人功德力摧伏一切魔此經所行處諸魔不敢侵聞經來聽受蓮花足下生我等聞斯要誓持不敢違猶如護一目愛惜不令傷我今護尊法憐愛甚於斯願此大乘法普度十天人爾時天尊歎天王言善哉善哉子等今眾眞實大乘護度一切是我眞子助我弘宣流通末世令諸一切咸得開悟汝等今座乘此妙因於未來劫必定當得至眞大道於是天王及諸大眾聞是說已心意泰然歡喜無量一時稱善作禮而退
