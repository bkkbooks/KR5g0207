body:
  text: 衆眞說法品第七爾時侍座童子名曰善見即從座起稽首禮問白天尊言今日侍座得聞希有微妙經典身心踴躍快樂難言天尊所說譬喻甚深非是二乘所得聞見善哉斯座昔未曾經諸㣲塵土一切衆眞皆得集會此諸大士何以心力觀諸法性而得值遇㣲妙尊經願爲開示眞人所行觀諸法性令諸衆生皆得開悟爾時天尊歎善見言善哉善哉侍座童子乃能爲諸將來衆生請我開演眞人所行觀諸法性於是天尊告諸眞人汝今等衆遇我今日微妙光明而得集會不可思議汝今等衆皆悉上士純一无雜明了法性童子所請願我廣說眞人所行以何心力故於今日得聞要說㣲妙大乘第一希有奇特妙義汝今等衆冝各顯說眞人行相令諸童子及將來世一切衆生得了眞人所行祕要大乘宻行爾時眞人名曰妙相告諸童子等今衆一心諦聽我等衆眞欲爲廣說眞人所行觀諸法性而得要妙開示未聞令得了悟眞人所行受諸禁戒一切威儀猶如世間諸善男女一時聞法心意踴躍无所疑惑生决定心眞人亦爾從昔以來至无量劫於其中間所持禁戒一切威儀心意踴躍无所疑惑生决定心无復違退是名眞人所行禁戒觀諸法性生决定心寶光眞人告童子言善見童子若諸眞人所行之法四无等心堅固不退是名眞人觀諸法性得决定心曜明眞人告童子言善見童子若諸眞人觀一切法决定皆得成无上道是名眞人觀諸法性得决定心普等眞人告童子言善見童子若諸眞人導引一切无有偏愛生一子想是名眞人觀諸法性得决定心聖行眞人告童子言善見童子若諸眞人於正行中心无動念觀諸色相无有異性是名眞人觀諸法性得决定心大悲眞人告童子言善見童子若諸眞人入於苦難濟拔衆生心无違退是名眞人觀諸法性得决定心遍通眞人告童子言善見童子若諸眞人心自思惟觀諸衆生无非眞實是名眞人觀諸法性得决定心德滿眞人告童子言善見童子若諸眞人於諸法中了辨无礙降伏外道令人正眞是名眞人觀諸法性得决定心敏濟眞人告童子言善見童子若諸眞人如一切性本來清靜不可思議是名眞人觀諸法性得决定心導師眞人告童子言善見童子若諸眞人身口心意導引衆生无有虛妄是名眞人觀諸法性得决定心善愛眞人告童子言善見童子若諸眞人觀一切法皆悉眞實无非眞道是名眞人觀諸法性得决定心達相眞人告童子言善見童子若諸眞人於諸魔衆皆來惱害心不瞋恚是名眞人觀諸法性得决定心高上眞人告童子言善見童子若諸眞人見諸衆生墮在生死心无所樂是名眞人觀諸法性得决定心勝慈眞人告童子言善見童子若諸眞人以无上心濟度衆生皆得成辨是名眞人觀諸法性得决定心開明眞人告童子言善見童子若諸眞人受諸禁戒心无違退是名眞人觀諸法性得决定心守藏眞人告童子言善見童子若諸眞人見諸寶物心无所愛著常樂供養是名眞人觀諸法性得决定心護持眞人告童子言善見童子若諸眞人於五欲中心无所樂常修淨行是名眞人觀諸法性得决定心等觀眞人告童子言善見童子若諸眞人觀諸衆生不見生相不見滅相是名眞人觀諸法性得决定心寂定眞人告童子言善見童子若諸眞人知諸衆生得聞此經决定成道是名眞人觀諸法性得决定心无礙眞人告童子言善見童子若諸眞人以功德香常流五道无有滯礙是名眞人觀諸法性得决定心凌空眞人告童子言善見童子若諸眞人見諸發心必定當得超升寶城是名眞人觀諸法性得决定心常念眞人告童子言善見童子若諸眞人見諸衆生念令開發心无休息是名眞人觀諸法性得决定心善變眞人告童子言善見童子若諸眞人知世間法无有住相亦无去相是名眞人觀諸法性得决定心靜定眞人告童子言善見童子若諸眞人爲衆說法不生法想是名眞人觀諸法性得决定心妙光眞人告童子言善見童子若諸眞人能以智慧滅无量罪是名眞人觀諸法性得决定心妙花眞人告童子言善見童子若諸眞人見諸天尊功德寶樹滿十方土是名眞人觀諸法性得决定心大慈眞人告童子言善見童子若諸眞人見衆生苦心不逺離是名眞人觀諸法性得决定心惠明眞人告童子言善見童子若諸眞人見有愚癡示以除斷是名眞人觀諸法性得决定心寶蓋眞人告童子言善見童子若諸眞人以无爲覆䕶一切令得安隱是名眞人觀諸法性得決定心爾時侍座諸童子等无鞅數衆聞諸眞人所說微妙眞實大乘要妙深遠皆各開悟同時稱善設禮而退觀法性品第八爾時度命眞人即從座起稽首禮問白天尊言如向所說眞人所見觀諸法性心无希望知法空故如是見者云何莊嚴一切衆生令得道邪天尊告曰度命眞士一切衆生性本情淨无所有故同虛空故道性亦空道性空故云何問言一切衆生云何得道衆生道性无有二相衆生性者即是幻性諸幻性者名爲法性於法性中无得无失无增无滅是故我言一切衆生不斷煩惱而得眞相度命眞人又復白言大德天尊若如所說一切衆生不修行願自然安樂天尊告曰度命眞士於法性中有修行願而得樂邪所謂安樂皆從心生心性本空云何修行若有安樂名爲有欲知諸法空乃名安樂眞人又言大德天尊旣諸衆生性本空云何說言一切衆生无量劫中修諸功德會不思議得居淨土天尊告曰度命眞士譬如愁人心意昏亂煩毒熱悶於此人前設諸幻術木男木女木牛木馬羅列施張作諸戲術愁者見之生牛馬想息諸煩惱心意泰然我今亦爾一切衆生虛妄愁毒未能安樂是故我說修諸功德无量无邊乃得徃生不思議土若知虛妄本无所有一切衆生舉足行步諸所作爲悉不思議若知清靜自在无礙心所求願恣意充足若有修善當得徃生三清妙土如此方便止彼虛妄而實未曾有彼三清常樂境界之所希望若欲速得三清寶城常樂淨土當以乘大无上惠心觀我身相從无量劫因何法生旣知无因乃知无我以无我故是故我身常在三清常樂淨土爾時度命眞人又復白言大德天尊一切衆生性命空寂虛妄无實皆如幻夢无决定故如是一切諸善男女不斷三業不行六度不修四等而得道邪天尊告曰度命眞士云何復作如是問邪一切衆生所有三業名爲不淨口業身意无所從故假使能修猶是虛妄云何虛妄三業本淨何所因修旣有所修由有不淨譬如病重迎諸醫藥善療衆病價直千金縁路迎接雖到宅舍終非藥具又如狂人雖說空花論其微妙終不可信一切衆生修身求道亦復如是修身求道具有二患何謂二患一者由有惡故二者見有身故如是二見道之大病是故衆生若欲求道當以大乘无上惠心觀我身相旣了无身三業自淨修六度行行四等心是名隨順方便引接譬如行客隔礙暘谷欲徃彼岸无因得過假借舟航以濟沉溺旣至彼岸向之舟航无所復用六度四行亦復如是爲諸衆生未能體了无生道岸是故假借六度安慰其心令得調伏即了无身得致道地六度諸行无所復用度命又言大德天尊所說譬喻要妙深逺一切衆生所修衆行以求度世旣得度已无所復行如是一切成眞得道无所行邪旣无所行應失大悲云何大道於諸衆生常行四弘以度衆苦天尊答曰度命眞士天尊大聖濟生度苦无彼此故无愛憎故无成壞故无得失故譬如橋船无心度物不揀淨穢是人非人牛馬騾驢皆悉通過天尊大聖无心大度亦復如是雖度衆生无彼此相无愛憎相无成壞相无得失相猶如大海容納百川无增无減无穢无淨无心揀擇含容一切金銀珠玉水晶琉璃硨磲碼碯珊瑚琥珀一切珍寶无不包藏眞道大藏亦復如是大羅三清四梵三界天人五道仙眞大聖无不容納以是之故无心常足不修諸行无去來相度命眞人於是歎言大德天尊所說微妙不可思議我所聞法踴躍歡喜无量无邊非是二乘所得聞見於是眞人同時稽首而說偈言善巧奇特无上尊所說微妙大乘經能爲時衆演斯義一切性空不生滅道性衆生本无二不假修因自然得法性幻性有異名清淨寂滅无殊致昔來我等實憂悲不斷煩惱非眞性始於今座得未曾聞斯大乘㣲妙法乃知衆生本空寂常樂自於无量劫起有欲心修衆行不知行空本无修大聖方便說修行譬如幻師設戲時木牛木馬自愁人人愁木馬俱虛妄知妄本无顚倒有即有顚倒不思議所說三清㣲妙土方便引接使歸眞了達无因无我相即我本土是三清能知我身是幻夢六度四等並虛陳假使能修无漏失終是虛妄有心爲譬如重病迎醫藥絡非藥具悅人心一見未能齊无相假使舟航渡險流得道成眞心行滅忘心度物諒无涯大海懷含无量寶眞道容藏一切珍我等聞今无上法欣斯三界是道場爾時大衆說斯偈巳不思議城无量大衆一時歡喜各還本座淨慧品第九爾時正見童子白眞人言度命眞人云何說言眞人所行於愛欲中心无所染不染无欲是名眞人觀諸法性得决定心眞人見諸愛欲有所見邪有所行邪眞人答言正見童子善哉斯問眞人所見諸有爲法譬如智人見熱時炎如大幻師見所幻事知非眞故心无所望眞人所見諸有爲法亦復如是眞人所見同衆生見衆生所見異眞人見云何爲同眞人所行同衆生行衆生所行即是十方天尊得道成眞之所知見云何大道同衆生行衆生所行即是空義眞人所行行道行處是故眞人所行同衆生行云何衆生所見異眞人見衆生所行有所行故有所分别虛妄見故以虛妄故心有所著有所著故所見不同是故衆生所見異眞人見童子又問大德眞士眞人所見當見何法而得决定眞人答曰正見童子眞人所見不見有爲不見无爲諸有爲法皆悉虛妄知虛妄空无所分别是名眞見无爲法者本來清淨无所有故亦无所見能了二見是名淨慧觀諸法性一切皆空是名眞見眞見明淨是名淨慧是故眞人於諸法中得决定心无所見故童子又問大德眞士如是說者一切衆生有所修習无所得耶眞人答曰正見童子何言此耶一切衆生若有能知无因无果无行无得是名因果是名行得若起諸見有所得心是名邪見不可親近无行无得是名正行眞人所行无所得故譬如明鏡照衆色像了了明淨无所障蔽而此明鏡終不自言我能明照妙林淨慧寶城集會諸微塵土一切衆眞心鏡明淨无所得故照一切法了了明淨无有障礙而諸眞人終不自言我能明照如彼明鏡等无有異又如清水照百千月性俱明故眞人所見亦復如是觀諸世間所有物處无非清淨性俱空故童子又問大德眞士一切世間旣无所有天尊出世无利益耶眞人答曰正見童子何於无法中而有利耶汝今所見十方天尊有生相耶童子答曰大德眞士我今所見无有生相知諸法空本來清淨是故天尊出現於世而无生相眞人又言正見童子十方天尊出現於世爲欲斷諸衆生虛妄說此妙經深邃之法令諸衆生各得淨慧明了法性无所障翳知諸法空本无虛妄虛妄旣空心性清淨乃知十方一切天尊无出没相以是之故十方天尊出現於世得大利益一切衆生皆得正見泰然安樂譬如夜夢見諸毒蛇開張牙齒近來逼身擬欲吞噬心神惶懼東西馳走呌聲烈天迷悶躃地床邊覺人咄哉睡夢何所呌耶而其夢人忽然睡覺伸舒手足乃知夢見虛妄眞非心意正定泰然安樂一切衆生同在三界无明巨室諸所爲作皆悉夢幻无有眞實天尊大聖說此大乘微妙經典覺悟一切令得正見具一切智淨慧圓滿悉得安樂旣得安樂巳不生貪著旣无貪著即得决定永不入流旣不入流則无和合无和合者即无无明旣无无明即无諸行旣无諸行即是永滅不起諸相畢竟清淨无言无說若有言說即是虛妄言虛妄者即是眞實何以故虛妄說者即是文字文字性空即是眞實以是因縁天尊所說虛妄之言皆悉眞實爾時侍座童子名曰法相前進稽首白眞人言大德仁者云何說言若諸眞人觀諸法性本來清淨是名眞人觀諸法性法性之性有耶无耶法性若有有則定常法性若无无則定空常有之性云何說空定空之性云何說妄性若定空而說妄者是則妄說譬如虛空空无所妄而說空妄是則妄說非空有妄性若定有云何說言若諸眞人觀諸法性本來清淨是名眞人觀諸法性得决定心定有之性而說空者是則說空非法性空法性非空而說空者亦是虛妄說法性空性本非空云何觀法而得决定如是二義實未能了願垂辯釋使諸衆等得了所疑愍濟眞人告童子言法相童子善哉斯問我今所說觀諸法性本來清淨云何問言法性之性有邪无邪性若定有所有之法不可說空性若定空所空之性不可說有若見性有即是常見若見性空即是斷見如是二見即是邪見三十六見非正眞見我今所見法性眞性非有非无非常非斷非生非滅非白非黑非青非黄非長非短非高非下非一非異非大非小非泠非熱非前非後非因非果以是義故我說眞人觀諸法性本來清淨无所有故雖言非有亦不定空雖說非空亦不常有不定有故法性非常不定空故法性非斷法性非斷不如兎角法性非常不若虛妄以是因縁我說眞人觀諸法性本來清淨无所有故譬如燈滅不可尋求畢竟清淨不可得故於是天尊歎眞人言善哉眞士快說斯義微妙希有眞實第一侍座童子无鞅數衆一時開悟是時童子號曰普明於大衆中而說偈言善哉妙林座功德難思議十方㣲塵衆遇此希有光空行臨妙座純一无上眞慧心觀妙法法性自然空世間有爲法諸法並非眞智者觀虛妄幻師見木人見幻同凡見凡人見異眞十方諸大道世界盡衆生俱行第一義迷失謂不然眞見了諸法眀觀照微塵天尊見身相諸相本无生說斯微妙典衆生悉體空故知三界空夢幻普非眞无明旣永滅諸行自消融以是知虛幻未曾非道場至眞无上士淨慧拯幽沉巧辯諸法性性空非有无常斷本清淨燈滅不可尋天尊歎希有善哉微妙經我等咸開悟俱欣无上心爾時天尊聞童子說偈頌已歎童子言善哉普明乆修淨慧故於今日同入寶城聞我大乘咸得開悟體解法性眀了世間性无所有實如所言我於今日快樂安隱无復憂慮汝等今衆於將來世宣我大乘㣲妙經典令諸將來有心之士咸得開悟同得淨慧无復疑滯了了決淨泰然安樂是時侍座无量大衆一切仙眞大力神王俱起作禮受命而退讃歎品第十爾時玉京山中大羅天王號曰高眞從座而起聞諸眞人所說法相踴躍歡喜即以㣲妙无量天花散於座上百和寶香熏時衆心不可思議城諸來大衆皆大歡喜於是天王白天尊言我諸大衆以何因縁遇斯希有㣲妙經典聞諸眞人所說法相幽奥難解未曾有法我自思惟若善男女一切衆生聞此大乘㣲妙經典一章一句能以一心信受奉行讀誦讃歎講說書寫如此之人即是大道眞實弟子其人威力能破一切生死魔怨所以者何眞人所說眞道正性清淨平等无有異相名爲悉破一切衆生无量邪見若復有人聞此說者不生疑惑生决定心受持供養爲人演說一章一句當知此人於无量劫種植善因故於今生明了法性聞斯大乘微妙經典不生驚怖若人聞此大乘經典未來生中墮三惡道斯无是處聞此經已一見歡喜功德无量當知是人舉足行步諸所爲作即是三清常樂因縁此經所在之處即爲諸天无量大神之所擁護若有講誦大乘經典所在之處能以一心來詣法座歡喜聽受當知是人已入法輪不思議城此經所在之處城邑聚落山林曠野觀舍壇場經所行處諸魔外道一切惡人不能加害我等今衆得見天尊放㣲妙光聞斯要說欣喜无量誓心奉持護斯經典不惜身命譬如瞎人唯餘一目護持此目畏有損傷我今護持此大乘經亦復如是畏有損傷不敢輕慢於是天王而說偈言我等无量衆俱入寶城中值光見希有微妙大乘經若有信心者受持此章句此人功德力摧伏一切魔此經所行處諸魔不敢侵聞經來聽受蓮花足下生我等聞斯要誓持不敢違猶如護一目愛惜不令傷我今護尊法憐愛甚於斯願此大乘法普度十天人爾時天尊歎天王言善哉善哉子等今衆眞實大乘護度一切是我眞子助我弘宣流通末世令諸一切咸得開悟汝等今座乘此妙因於未來劫必定當得至眞大道於是天王及諸大衆聞是說巳心意泰然歡喜无量一時稱善作禮而退大乘妙林經卷下
