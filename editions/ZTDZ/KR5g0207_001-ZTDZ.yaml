body:
  text: 序品第一元始天尊時在不思議山七寶城中元陽宫内師子座上八威備衛端坐閑居身心不動經七小劫不起于座放大光明遍照十方无量國土微塵世界无不遍及時彼三千大千世界无量國土諸仙真聖洗然驚歎異口同音俱發聲言咄哉彼土大德天尊以何因縁放希有光奇特妙相時諸三千大千世界微塵國土諸仙聖衆遥望山中光相挺特妙麗希有无以爲喻馳誠欣慕口不能言咸欲競徃爾時天尊安庠動念以他心智遥觀彼土他方聖衆心意虔恭是諸聖衆純是上士悉堪受度因發大聲告諸十方无量國土汝等真士宿植德本純一无二是我真子堪持寶藏我今欲入長樂妙土汝等真士乘我希有微妙光明俱來法座值我今日難勝之法爾時十方微妙世界无量國土他方聖衆聞是聲音心大歡喜普乘神光飛空越谷皆悉上士尋光而來是諸大衆煩惱已空明了法性其字曰淨行真人妙相真人寶光真人曜明真人辨才真人普等真人聖行真人遍通真人德滿真人度命真人慜濟真人導師真人善愛真人達相真人高上真人勝意真人開明真人守藏真人護持真人等觀真人寂定真人无礙真人凌空真人常念真人化通真人善變真人靜定真人妙光真人妙花真人大慈真人慧明真人寶蓋真人等諸大衆无量真人與諸徒從并及无量天龍大力神王无鞅數衆細雨宻霧一時俱到不思議山圍繞三匝瞻仰天尊安庠雅步稽首禮足問訊畢即依位而坐爾時天尊以大慈心熏脩大衆微聲唱言子等真士於无量劫衆善普會致於今日值希有光得覩難勝未曾有法普來集會不可思議我今欲入長樂妙境汝等真士若有所疑恣來啓問於是淨行真人即從座起正巾歛褐長跪稽首白天尊言我今等衆乘希有光欲有所問若垂聽許乃敢諮陳天尊告曰淨行真人子今善能爲衆開發諮請法相恣汝所問勿自疑難吾當爲汝分别解說决了所疑於是淨行旣蒙聽許心意踊躍歡喜无量白天尊言如是身相大光普遍妙麗希有光相挺特超百千日不可思議我自思惟如是身相希有難思若有衆生見斯光者即名真士能見諸法不壞眼根天尊告曰淨行真士實如所言我今身相有无量光名无量義若有衆生能見我身微妙光明即得眼根通達明淨能了諸法觀諸法性性相湛然不壞世法而得真相又我身相有无量光名无量義若有衆生能聞我身微妙光明即得耳根通達明淨能了諸法聞諸法性性相湛然不壞世法而得真相又我身相有无量光名无量義若有衆生能齅我身微妙光明即得鼻根通達明淨能了諸法齅諸法性性相湛然不壞世法而得真相又我真相有无量光名无量義若有衆生能言我身微妙光明即得舌根通達明淨能辨諸法言諸法性性相湛然不壞世法而得真相又我身相有无量光名无量義若有衆生能觸我身微妙光明即得身根通達明淨能覺諸法知諸法性性相湛然不壞世法而得真相又我身相有无量光名无量義若有衆生能知我身微妙光明即得心根通達明淨能了諸法悟諸法性性相湛然不壞世法而得真相淨行真士我今身相无量光明假使盡諸十方三千大千世界碎爲微塵一一塵中復爲十方无量世界又復碎諸无量世界皆爲微塵以此塵數比我身光千億萬分未得其一是故十方无量國土若有衆生遇斯光者即得身中六根明淨通達无碍能了諸法性相湛然不壞世法而得真相以此光明莊嚴一切无量无邊微塵世界一切衆生皆悉成就无上正真金剛妙相光明功德不可思議終劫說之亦不能盡於是淨行并諸大衆聞天尊說微妙光明利益衆生无量无邊俱發聲言歎未曾有大德天尊微妙身相光明大藏福惠莊嚴實无窮盡是時妙相真人聞天尊說法身微妙光明特甚天上人間未有斯匹前進稽首白天尊言大德天尊我今所見天尊身相大光普遍諸微塵界他土大士十方聖衆俱來集會欲聞要言未審今會不思議城希所常有天尊所演光相微妙无上法輪今之所說當何名號唯願解說訣了所疑令此衆會得眄篇目心意泰然功德无量爾時天尊欣然悅豫歎妙相言善哉善哉妙相真士善能通達觀諸法性心意无㝵故能爲衆諮請要言子等諦聽我今爲說微妙難思未曾有法自昔以來爲衆開演未如今日大光普照他土世界微塵聖衆俱來集會不思議山聞此勝法我所說无上尊經名爲妙林亦名勝習子等諦思无上大乘微妙經典若有一人聞此經名一心信受思念恭敬尊重讃歎解其義味爲人演說稱揚大道當知是人曾於无量億劫之中已種善根功德成辦故於今日得聞大乘微妙經典此人即是一切衆生大慈悲父開悟一切爲衆道師世間衆生當於此處勤種功德能以一心不生懈退是人所得大乘功德无量无邊不可稱說假使盡諸十方三千大千世界一切草木寸斬爲籌以此籌筭其人功德亦不能盡是故汝等俱入寶城聞此妙林大乘名字必得上道入於長樂常住妙土功德巍巍與我无異是時大衆聞說經名一時開悟舉手彈指稽首稱善於是寶光執笏安庠前進作禮上白天尊臣以有幸得預斯集向聞所說微妙大乘祕要經典所說經名妙林勝習臣等下愚未能自了不審天尊以何義故名此尊經爲妙林邪願爲解說示以要言令衆曉悟饒益一切决了所疑天尊告曰寶光真士乃於今日能發大慈爲衆諮請真實要言開悟將來不可思議汝今復座吾當爲汝分别解脫令衆得明開悟將來使得安樂我今所說大乘妙林无上尊經功德无量不可思議猶彼寶林能生果實資益一切食此花實身相金光无不微妙人聞此經一心聽受得其義味智慧圓明身相㣲妙以是之故與彼无異又彼寶林根株莖葉悉是真文㣲風一動能發洞章聲音㣲妙若得聞者了然悟道我今法相如彼妙林若有衆生㣲心一感現以聲教聲音㣲妙若有聞者即得正真以是之故與彼无異又彼妙林莫知本始劫劫常生種類不絶我今法相如彼寶林莫知本始劫劫出現種性不絶以是之故與彼无異又彼寶林枝條覆蔭三千世界无不周遍我今法相德蔭三千大千國土彌羅无外以是之故與彼无異又彼妙林无心隨順從風偃仰假有霜雪不能凋殘我今法相亦復如是无心善順物感常通假有煩惱三塗惡報莫能傷害以是之故與彼无異諸微塵土一切大衆見我光明難勝希有越空赴谷俱來集會不思議山習我勝因聞斯要訣諸來大衆聞此大乘智慧日新功德无量以是之故亦名勝習寶光等衆无量无邊聞此要言咸皆開悟同時行禮稽首稱善於是寶光而說偈言善巧无上大悲尊不捨四弘度衆生示現端坐不思議放大光明照十方㣲塵國土无邊衆俱見法身㣲妙光大衆純一无上士堪持妙林希有經他心了達无邊境高聲唱言真實賓我今欲入長樂土故命時衆來受持衆等同聞大歡喜飛空越谷一時臨煩惱已盡皆自在明了法性大乘門圍繞瞻聽忘疲厭安庠前進禮天尊大悲熏修无限量唱說時衆乆行因故得聞今希有法善哉集會不思議功圓行滿入長樂告衆疑問在今晨故得慧明无上士淨行正念動三千乘斯大會希有座告令疑網任諮陳旣蒙聽命勝所請進前敢言希有光大悲善巧說身相无量光明奇特尊遇得斯照六相淨不壞世法即真身假令微塵諸世界細末盡數不能量又有久脩真大士號曰妙相問經名故得大慈降法雨篇目名字總披陳若得遇聞此名號功德福惠悉莊嚴假令三千諸草木寸斬筭數不能知我亦乘今无上惠更問經名義云何旣蒙法王无上訣名義諸疑悉已除我等時衆同斯集自慶得聞妙林經故得上登无極位一切衆生離囂塵寶光等是時大衆聞說偈頌已心大歡喜咸皆開悟一時稽首復還本座觀真相品第二爾時曜明真人前進稽首白天尊言我等時衆聞天尊說微妙光眀希有難值若後有人遇斯光者即得六根通達明淨不壞世法而得真相臣以下愚未了斯義不審世間及以真相爲一相邪爲異相邪若是一相何以名世若世是真何不名真若異相者旣得真相云何不壞世間不壞云何得真世間不壞而得真者譬如種子種子不壤芽莖花實從何而生如是二趣實未能了願垂㫖訣得釋所疑天尊告曰曜明真士善能方便爲諸衆生訣此疑惑子今復座吾當爲說子今所問世間真相爲一相邪爲異相邪今當問子子之所見爲法見邪爲相見邪曜明答曰大德天尊世間真相有法見邪有相見邪天尊答曰曜明真士真相世間本无差别衆生所見未能通達但觀其相未能見法是故分别世間眞相其相不同今以慧眼觀世間相即相是眞能了眞相名爲見法以是之故不壞世間而得眞相曜明又問大德天尊不壞世間而得眞相未審世間以何爲相而言不壞即是眞相天尊告曰曜明眞士世間相者即是无明貪着愛見瞋恚愚癡等諸煩惱是世間相曜明又問大德天尊无明貪愛瞋恚愚癡等諸煩惱是世間相旣言不壞即得眞相是則眞相猶有貪愛旣有貪愛是眞何須說言斷諸煩惱而得眞相天尊告曰曜明眞士實如所言不斷煩惱而得眞相今言斷者爲諸衆生未能見法唯見无明貪愛愚癡瞋恚煩惱故須說斷而得眞相若人能知煩惱性空本无貪愛无明永淨无法可斷以是當知不斷煩惱而得眞相眞相无相无相无得无明无法无法无斷无斷无得名斷煩惱无得无斷名得眞相以是當知不斷煩惱而得眞相曜明又問大德天尊眞相煩惱旣无二相无二相故言得眞相何以不言煩惱眞相无二相故言得煩惱天尊答曰曜明眞士如向所說是有二種一者相見二者法見法見之人言得眞相相見之人言得煩惱以是當知法見之人常觀妙本故得眞相相見之人常觀麄迹故得煩惱若人能知煩惱性空未曾有法從迹觀本名得法見若復有人无明闇蔽唯見煩惱從无明見名爲眞相又語曜明若復有人見有煩惱又有眞相煩惱眞相皆爲煩惱若人能知此煩惱不異眞相眞相无相煩惱眞相名爲眞相又語曜明子向問言譬如種子種子不壞芽莖枝葉花實等從何而生吾今問子種子壞邪芽實生邪種子若壞壞則无因无因有果斯无是處芽生種壞壞則不生壞爲生因亦非是處以是當知種子芽莖枝葉花實非生非壞非因非果非不因果煩惱眞相亦復如是非前非後非一非異非不一異又語曜明汝謂種子壞乃芽生今又問子種壞芽生壞時生耶未壞生耶壞後生耶壞時生者以壞爲生生則不生生而壞者以生爲壞壞則不壞云何種壞而得芽生譬如蔭壞身則不生无蔭有身理則不然以是當知種子旣壞芽則不生无種有芽理亦不然是故我言壞則不生若有說言壞時生者與壞同體云何得生譬如一身諸根同體云何頭壞而得足生頭壞足生理則不然以是當知種子壞時芽則不生生壞同體理亦不然是故我言壞時不生壞後生者生滅相離云何爲因譬如敗種種已先滅滅即无芽云何芽後從敗種生以是當知壞後不生壞已芽生理亦不然是故我言種子壞後芽亦不生又語曜明種壤芽生生壤一耶生壞異耶生壞一者壞則相違云何同體滅則不生云何壞生生則不滅云何生壞異者異則非因非因生果理則不然譬如虛空非兎角因虛空非因生兎角果理則不然以是當知異亦不生云何有生又語曜明未壞生者是則種子體中未變未變芽生芽生則无因无因有果无種有芽理則不然猶如无形影則不生形若未生有影生者當知此影不從形生譬如麻子麻子未壤油則不生以是當知未壞不生云何有生又語曜明壞後生者彼種巳滅滅則无因滅後生芽此芽始生生則非果彼種滅已有芽生者理則不然猶有无乳酪則不生若无彼乳而有此酪是則酪有不從乳生以是當知壞後不生云何有生檢求生相畢竟永滅不可得故是故无生爾時辯才即從座起安庠而進白天尊言我自思惟一切衆生飄浪生死皆由无明貪着愛見我又思惟愛見无明從何而有致令衆生飄浪生死是生死本從心生耶從眼生耶從耳生耶從鼻生耶從舌生耶從内生耶從外生耶從有生耶從空生耶我今等衆實未能了願爲解說得釋所疑天尊告曰辯才眞士善哉斯問子今復座當爲子說生死根本從空而生亦從有生從内而生亦從外生從鼻而生亦從舌生從眼而生亦從耳生本无從生亦從心生何以故心法空故心法旣空无明亦空无眀旣空貪愛亦空貪愛旣空生死亦空生死旣空眼法亦空眼法空故耳法亦空耳法空故鼻法亦空鼻法空故舌法亦空舌法空故内外亦空内外空故空有亦空以是因縁生死根本從空而生又語辯才空法本空心法亦空云何空法生心法空心法旣空從空生心是則東方本空生西方空旣知東方本空不生西空當知空法本空不生心法心法旣空不從空生當知心法法相本空不生无明旣知无明本空不從心生當知无明本空不生貪着旣知貪着本空不從无明當知貪着亦空不生愛見旣知愛見本空不從貪着當知愛見亦空不生心法旣知心法本空不從愛見當知心法亦空不生眼法旣知眼法本空不從心生當知眼法亦空不生耳法旣知耳法本空不從眼生當知耳法亦空不生鼻法旣知鼻法本空不從耳生當知鼻法亦空不生舌法旣知舌法本空不從鼻生當知舌法亦空不生内法旣知内法本空不從舌生當知内法亦空不生外法旣知外法本空不從内生當知外法亦空不生有法旣知有法本空不從外生當知有法亦空不生空法旣知空法本空不從有生當知空法亦空不生生死旣知生死本空不從空生當知生死亦不生死一切有爲煩惱以是當知有爲生死衆生飄浪如虛中雲如空中色如谷中響如水中月如鏡中像如熱中炎如電中火如聾中聽如盲中視如啞中言如二頭鶴如三足鷄如龜中毛如兎中角中是无明貪着愛見生死之本亦復如是畢竟皆空不可論說譬如燈滅不可尋求生死本空亦復如是如大猛火如四毒蛇不可親近生死之法亦復如是子等當復作如是觀乃得无爲出離生死於是辯才等衆聞是要言歡喜踴躍歎未曾有於是大衆同聲稱善而說偈言无上大悲尊善巧說眞相世間煩惱本即无上慧因衆生未能了故說斷貪瞋若知本非有生死即道場无明性永滅煩惱諒風聲慧眼當清淨法見明重昏本來无二相麄妙信開縁若能辯无二三界不思議執心在眞相道場恚貪瞋種子未曾滅芽莖實不生先有不從因先无何所生三時辯生法種子實非因自體未曾有芽莖何所從辯才无上士善諮生死因大悲諒无盡爲衆悉敷陳无明與生死譬如空谷聲聾盲所聞見世間實不然智者觀生死猶如大幻師土梗何曾走木雞詎翔空若能明斯趣一切不思議爾時天尊歎大衆言善哉善哉汝等今衆聞希有法體了眞相實如所陳乘我今日宣語將來一切衆生令得曉了與今无異爾時大衆稽首稱善辯邪正品第三爾時普等眞人即從座起前進作禮上白天尊我自思惟天尊身相光明挺特微妙難思如金剛王摧折一切智慧明了結習永除端然獨步不思議城我今欲問未敢自陳願垂大慈賜示儀軌修行階級其義云何使將來世得見正眞天尊告曰善哉善哉普等眞士善能利益將來衆生能發斯問開悟愚蒙子今復座吾當爲說凡所問者具有二種一者正問二者邪問若正問者與道爲親若邪問者是魔眷屬普等又問何等爲正何等爲邪天尊告曰若人作有爲問无爲故問名爲邪問非有爲問非无爲問名爲正問若人見生故問見滅故問各爲邪問不見生問不見滅問名爲正問若人見住故問見壞故問名爲邪問不見住問不見壞問名爲正問若人見罪故問見福故問名爲邪問不見罪問不見福問名爲正問若人見淨故問見穢故問名爲邪問不見淨問不見穢問名爲正問若人見是故問見非故問名爲邪問不見是問不見非問名爲正問若人見親故問見踈故問名爲邪問不見親問不見踈問名爲正問若人見空故問見有故問名爲邪問不見空問不見有問名爲正問若人見苦故問見樂故問名爲邪問不見苦問不見樂問名爲正問若人見聖故問見凡故問名爲邪問不見聖問不見凡問名爲正問若人見善故問見惡故問名爲邪問不見善問不見惡問名爲正問若人見施故問見盗故問名爲邪問不見施問不見盗問名爲正問若人見持戒問見破戒問名爲邪問不見持戒問不見破戒問名爲正問若人見長故問見短故問名爲邪問不見長問不見短問名爲正問若人見貴故問見賤故問名爲邪問不見貴問不見賤問名爲正問若人見得故問見失故問名爲邪問不見得問不見失問名爲正問若人見邪故問見正故問名爲邪問不見正問不見邪問名爲正問若人見問故問不見問故問名爲邪問不見問問不見不問名爲正問如是等類皆有邪正邪正所有皆從心生心之所生皆是顚倒非有見有非无見无非生見生非滅見滅非住見住非壞見壞非罪見罪非福見福非淨見淨非穢見穢非是見是非非見非非親見親非踈見踈非空見空非有見有非苦見苦非樂見樂非聖見聖非凡見凡非善見善非惡見惡非施見施非盜見盜非持見持非犯見犯非長見長非短見短非貴見貴非賤見賤非得見得非失見失非邪見邪非正見正非問見問非見見見如是諸見皆悉虛妄如幻如夢死一眞實何以故諸法无心有心見法名爲邪見若人能知諸法无心不起心見是名正見是當知有心問者皆爲邪問无心問者乃名正問以是義故我今不令一切衆生斷滅煩惱而得眞相但欲度諸妄想衆生故說煩惱眞相二義實无生死可得眞相所以者何諸法清靜本无二相无所徃來是故我今不令衆生斷滅煩惱乃得眞相雖說煩惱實无煩惱之可斷滅雖說常樂亦无常樂之可欣慕旣无煩惱是故衆生不失眞相旣无眞相是故我今不捨煩惱若復有人於末世中能發此念體解正眞是名大乘修眞正行於是普等聞斯說已心大歡喜告諸大衆无億數人同體无爲俱入正眞爾時聖行大士白天尊言於未來世若有衆生於諸法中生有見心是則大道永没不行於世若見三清是清淨境心所欣慕如此人者永劫脩功不得解脫所以者何三清境界名爲寂滅逺離諸塵不受諸愛若有見心則墮邪見非修正行名爲永失无上法邪於是天尊歎聖行言善哉善哉實如所言聖行眞士宿植德本明了實相通達无礙故於今日爲衆决疑眞爲深要若復有人於諸法中生有見心捨於穢土求三清樂捨衆生身求眞道相欲斷煩惱而入无爲求離諸見乃得寂滅如是等相我說此人名大邪見憎慢之人譬如愚人畏於天地而欲走避所至之處不離大地衆生亦爾畏生死身疾捨三界有心厭離所得之身不離生死如是衆生未能見法求眞道相深實可哀眞道相者名爲不作无所起滅非有非无非長非短非大非小非色非心能體此相名爲修習眞道正行語聖行世間衆生无明障重眞道在身莫能覩見譬如愚人東西馳走覓虛空色而不能見即色是空一切世間亦復如是心性馳騁欲求眞道不知身心即是眞道譬如愚人但見竹木而不知火捨木求火而不知火巳在木中一切世間亦復如是捨身求道而不知道已在身中捨木求火譬如愚人捨形求影捨聲求響而不知形是影根聲爲響本以是當知世間邪見煩惱熾盛猶荆棘林如蒺梨園不可親近汝等今衆乘我今日宣示將來令知三清不離煩惱令知大道不在他方但觀身心修習正行自然解脫永離煩惱常處三清子善思惟自然安樂於是聖行又復白言大德天尊云何說言一切衆生即是眞道而復告命修習正行乃得安樂若其是道何須修習猶如羽鳥何須習飛譬如鱗族何須習水雲昇雨降不關習學若諸衆生已是眞道何須修習而得安樂願爲解說得釋所疑天尊告曰聖行眞士善哉斯問如我向言眞道衆生如木中火非一非異非即非離即木有火而木非火離木无火而火非木木非是火故云非一火不離木故云非異以是當知衆生眞道非一非異非即非離即生有道而生非道離生无道而道非生生非是道故云非一道不離生故云非異以是當知若欲求火於木中求不於氷中求若欲求道於身中求不於他求於氷求火他方求道假使力能移山功能竭海力之彌勤功之殊妙終劫行之去道愈逺是故我今告諸衆生若欲求火當須人功備其鑚具運動力手然後見火衆生學道修習正行亦復如是當以善功備其種智觀此身中運動心神然得見道以是之故我令衆生修習正眞乃得安樂習空鱗水亦須運用而得昇降空行水去眞道衆生不以爲類雲昇雨降无識无心不關習學如斯等類並是世間不比眞道子善思惟自當得解於是聖行又復白言大德天尊衆生求道於身中求不於他求身中空邪他方有邪天尊答曰聖行眞士三十六問名爲邪見聖行又問大德天尊見木有火見氷有水見氷无火見木无水邪天尊答曰聖行眞士爲諸未悟隨順世間聖行又問大德天尊氷有火耶木有水耶天尊答曰聖行眞士於虛空中見衆色像聖行又問大德天尊於氷求火於木求水斯見處邪天尊答曰聖行眞士見身求道滅諸有爲求得解脫斯非是處若求眞道但自觀身若求虛空但觀諸有觀身實相道從身生亦從心生從眼耳生從鼻舌生從四大生從百體生觀物眞相空從天生亦從地生亦從我生亦從他生從水火生從草木生從十方生從萬物生以是義故我說此經度微塵衆而未嘗見有一衆生得受度也何以故我眼旣空衆生亦空空无分别分别空故是故我眼智慧眀淨能觀一切通達无礙觀諸三千大千世界過去未來一切衆生悉已受度以是因縁我說空中具足一切无量色像於是聖行并諸大衆聞說要言俱起作禮而說偈言具足一切智善哉奇特尊說今微妙法邪正甚分明顚倒生取捨正眞非有无心法非本有有心虛妄生善巧順諸有有滅齊正眞正眞无復相煩惱實本空衆生不異道諸見悉无爲有心欲除斷大行永不行三清非逺妙滅在胸襟若起有心見惠牙永消摧天尊說此類名爲憎慢人猶如畏大地疾走欲藏身縱日馳千里非地不容身厭身欲求道見道不忘身存身去道逺生死反成親至眞无起滅大道離斷常若有體斯妙名爲修正眞衆生由障重失道唯見身將身欲求道觀色不知空譬如愚見木不知火所從影響非殊逺形聲是本源邪見生煩惱蒺䔧荆棘藂有見生毒害傷身何異斯三清即煩惱大道諒我身猶如木中火鑚具及人功積善求眞道安樂會正眞說經度一切筭數不能量照本元來去受度悉虛陳虛空諒无際衆生何所依我眼本清淨通達了大千未來及過去見在盡微塵久於无量劫悉已會正眞大乘妙林經卷上
