  text: 重刊道藏輯要大乘妙林經
  hash: sha256:cf6b157117fa06f4af02bf32ae735da98221660c361c3a534fc8520dc531d81f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0207_YP-C_03diji-05-0001a, image: JY009/03diji-05-0001a.png}
body:
  text: 序品第一元始天尊時在不思議山七寶城中元陽宮内獅子座上八威備衞端坐閑居身心不動經七小劫不起於座放大光明遍照十方无量國土微塵世界旡不遍及時彼三千大千世界无量國土諸仙眞聖嘅然驚歎異口同音俱發聲言咄哉彼土大德天尊以何因緣放希有光奇特妙相時諸三千大千世界微塵國土諸仙聖眾遙望山中光相挺特妙麗希有无以爲喻馳誠敬慕口不能言咸欲就往爾時天尊安庠動念以他心智遙觀彼土他方聖眾心意䖍恭是諸聖眾維是上士悉堪受度因發大聲告諸十方无量國土汝等眞士宿植德本純一无二是我眞子堪持寶藏我今欲入長樂妙土汝等眞士乘我希有微妙光明俱來法座値我今日難勝之法爾時十方微妙世界无量國土他方聖眾聞是聲音心大歡喜普乘神光飛空越谷皆悉上士尋光而來是諸大眾煩惱已空明了法性其字曰淨行眞人妙相眞人寶光眞人曜明眞人辨才眞人普等眞人聖行眞人遍通眞人德滿眞人度命眞人慜濟眞人導師眞人善愛眞人達相眞人高上眞人勝意眞人開明眞人守藏眞人護持眞人等觀眞人寂定眞人无碍眞人凌空眞人常念眞人化通眞人善變眞人靜定眞人妙光眞人妙花眞人大慈眞人慧明眞人寶蓋眞人等諸大眾无量眞人與諸徒從并及无量天龍大力神王无鞅數眾細雨密霧一時俱到不思議山圍繞三帀瞻仰天尊安庠雅步稽首禮足問訊畢卽依位而坐爾時天尊以大慈心熏脩大眾微聲唱言子等眞士於无量劫眾善普會致於今日値希有光得覩難勝未曾有法普來集會不可思議我今欲入長樂妙境汝等眞士若有所疑恣來啟問於是淨行眞人卽從座起正巾歛褐長跪稽首白天尊言我今等眾乘希有光欲有所問若垂聽許乃敢諮陳天尊告曰淨行眞人子今善能爲眾開發諮請法相恣汝所問勿自疑難吾當爲汝分别解說决了所疑於是淨行旣蒙聽許心意踊躍歡喜无量白天尊言如是身相大光普遍妙麗希有光相挺特超百千日不可思議我自思惟如是身相希有難思若有眾生見斯光者卽名眞士能見諸法不壞眼根天尊告曰淨行眞士實如所言我今身相有无量光名无量義若有眾生能見我身微妙光明卽得眼根通達明淨能了諸法觀諸法性性相湛然不壞世法而得眞相又我身相有无量光名无量義若有眾生能聞我身微妙光明卽得耳根通達明淨能了諸法聞諸法性性相湛然不壞世法而得眞相又我身相有无量光名无量義若有眾生能齅我身微妙光明卽得鼻根通達明淨能了諸法齅諸法性性相湛然不壞世法而得眞相又我眞相有无量光名无量義若有眾生能言我身微妙光明卽得舌根通達明淨能辨諸法言諸法性性相湛然不壞世法而得眞相又我身相有无量光名无量義若有眾生能觸我身微妙光明卽得身根通達明淨能覺諸法知諸法性性相湛然不壞世法而得眞相又我身相有无量光名无量義若有眾生能知我身微妙光明卽得心根通達明淨能了諸法悟諸法性性相湛然不壞世法而得眞相淨行眞士我今身相无量光明假使盡諸十方三千大千世界碎爲微塵一一塵中復爲十方无量世界又復碎諸无量世界皆爲微塵以此塵數比我身光千億萬分未得其一是故十方无量國土若有眾生遇斯光者卽得身中六根明淨通達无碍能了諸法性相湛然不壞世法而得眞相以此光明莊嚴一切无量无邊微塵世界一切眾生皆悉成就无上正眞金剛妙相光明功德不可思議終劫說之亦不能盡於是淨行并諸大眾聞天尊說微妙光明利益眾生无量无邊俱發聲言歎未曾有大德天尊微妙身相光明大藏福惠莊嚴實无窮盡是時妙相眞人聞天尊說法身微妙光明特甚天上人間未有斯匹前進稽首白天尊言大德天尊我今所見天尊身相大光普遍諸微塵界他土大士十方聖眾俱來集會欲聞要言未審今會不思議城希所常有天尊所演光相微妙无上法輪今之所說當何名號唯願解說訣了所疑令此眾會得盼篇目心意泰然功德无量爾時天尊欣然悅豫歎妙相言善哉善哉妙相眞士善能通達觀諸法性心意無碍故能爲眾諮請要言子等諦聽我今爲說微妙難思未曾有法自昔以來爲眾開演未如今日大光普照他土世界微塵聖眾俱來集會不思議山聞此勝法我所說无上尊經名爲妙林亦名勝習子等諦思无上大乘微妙經典若有一人聞此經名一心信受思念恭敬尊重讚歎解其義味爲人演說稱揚大道當知是人曾於无量億劫之中已種善根功德成辦故於今日得聞大乘微妙經典此人卽是一切眾生大慈悲父開悟一切爲眾導師世間眾生當於此處勤種功德能以一心不生懈退是人所得大乘功德无量无邊不可稱說假使盡諸十方三千大千世界一切草木寸斬爲籌以比籌算其人功德亦不能盡是故汝等俱入寶城聞此妙林大乘名字必得上道入於長樂常住妙土功德巍巍與我无異是時大眾聞說經名一時開悟舉手彈指稽首稱善於是寶光執笏安庠前進作禮上白天尊臣以有幸得預斯集向聞所說微妙大乘秘要經典所說經名妙林勝習臣等下愚未能自了不審天尊以何義故名此尊經爲妙林邪願爲解說示以要言令眾曉悟饒益一切決了所疑天尊告曰寶光眞士乃於今日能發大慈爲眾諮請眞實要言開悟將來不可思議汝今復座吾當爲汝分别解說令眾得明開悟將來使得安樂我今所說大乘妙林无上尊經功德无量不可思議猶彼寶林能生果實資益一切食此花實身相金光无不微妙人聞此經一心聽受得其義味智慧圓明身相微妙以是之故與彼无異又彼寶林根株莖葉悉是眞文微風一動能發洞章聲音微妙若得聞者了然悟道我今法相如彼妙林若有眾生微心一感現以聲教聲音微妙若有聞者卽得正眞以是之故與彼无異又彼妙林莫知本始劫劫常生種類不絕我今法相如彼寶林莫知本始劫劫出現種性不絕以是之故與彼无異又彼寶林枝條覆蔭三千世界无不周遍我今法相德蔭三千大千國土彌羅无外以是之故與彼无異又彼妙林无心隨順從風偃仰假有霜雪不能凋殘我今法相亦復如是无心善順物感常通假有煩惱三塗惡報莫能傷害以是之故與彼无異諸微塵土一切大眾見我光明難勝希有越空赴谷俱來集會不思議山習我勝因聞斯要訣諸來大眾聞此大乘智慧日新功德无量以是之故亦名勝習寶光等眾无量无邊聞此要言咸皆開悟同時行禮稽首稱善於是寶光而說偈言善巧无上大悲尊不捨四弘度眾生示現端坐不思議放大光明照十方微塵國土无邊眾俱見法身微妙光大眾純一无上士堪持妙林希有經他心了達无邊境高聲唱言眞實賓我今欲入長樂土故命時眾來受持眾等同聞大歡喜飛空越谷一時臨煩惱已盡皆自在明了法性大乘門圍繞瞻聽忘疲猒安庠前進禮天尊大悲熏修无限量唱說時眾久行因故得聞今希有法善哉集會不思議功圓行滿入長樂告眾疑問在今晨故得慧明无上士淨行正念動三千乘斯大會希有座告令疑網任諮陳旣蒙聽命勝所請進前敢言希有光大悲善巧說身相无量光明奇特尊遇得斯照六相淨不壞世法卽眞身假令微塵諸世界細末盡數不能量又有久修眞大士號曰妙相問經名故得大慈降法雨篇目名字總披陳若得遇聞此名號功德福惠悉莊嚴假令三千諸草木寸斬筭數不能知我亦乘今无上惠更問經名義云何旣蒙法王无上訣名義諸疑悉已除我等時眾同斯集自慶得聞妙林經故得上登无極位一切眾生離囂塵寶光等是時大眾聞說偈頌已心大歡喜咸皆開悟一時稽首復還本座觀眞相品第二爾時曜明眞人前進稽首白天尊言我等時眾聞天尊說微妙光明希有難値若後有人遇斯光者卽得六根通達明淨不壞世法而得眞相臣以下愚未了斯義不審世間及以眞相爲一相邪爲異相邪若是一相何以名世若世是眞何不名眞若異相者旣得眞相云何不壞世間不壞云何得眞世間不壞而得眞者譬如種子種子不壞芽莖花實從何而生如是二趣實未能了願垂旨訣得釋所疑天尊告曰曜明眞士善能方便爲諸眾生訣此疑惑子今復座吾當爲說子今所問世間眞相爲一相邪爲異相邪今當問子子之所見爲法見邪爲相見邪曜明答曰大德天尊世間眞相有法見邪有相見邪天尊答曰曜明眞士眞相世間本无差别眾生所見未能通達但觀其相未能見法是故分别世間眞相其相不同今以慧眼觀世間相卽相是眞能了眞相名爲見法以是之故不壞世間而得眞相曜明又問大德天尊不壞世間而得眞相未審世間以何爲相而言不壞卽是眞相天尊告曰曜明眞士世間相者卽是无明貪着愛見瞋恚愚癡等諸煩惱是世間相曜明又問大德天尊无明貪愛瞋恚愚癡等諸煩惱是世間相旣言不壞卽得眞相是則眞相猶有貪愛旣有貪愛是眞何須說言斷諸煩惱而得眞相天尊告曰曜明眞士實如所言不斷煩惱而得眞相今言斷者爲諸眾生未能見法唯見无明貪愛愚癡瞋恚煩惱故須說斷而得眞相若人能知煩惱性空本无貪愛无明永淨无法可斷以是當知不斷煩惱而得眞相眞相无相无相无得无明无法无法无斷无斷无得名斷煩惱无得无斷名得眞相以是當知不斷煩惱而得眞相曜明又問大德天尊眞相煩惱旣无二相无二相故言得眞相何以不言煩惱眞相无二相故言得煩惱天尊答曰曜明眞士如向所說是有二種一者相見二者法見法見之人言得眞相相見之人言得煩惱以是當知法見之人常觀妙本故得眞相相見之人常觀麄迹故得煩惱若人能知煩惱性空未曾有法從迹觀本名得法見若復有人无明闇蔽唯見煩惱從无明見名爲眞相又語曜明若復有人見有煩惱又有眞相煩惱眞相皆爲煩惱若人能知此煩惱不異眞相眞相无相煩惱眞相名爲眞相又語曜明子向問言譬如種子種子不壞芽莖枝葉花實等從何而生吾今問子種子壞邪芽實生耶種子若壞壞則无因无因有果斯无是處芽生種壞壞則不生壞爲生因亦非是處以是當知種子芽莖枝葉花實非生非壞非因非果非不因果煩惱眞相亦復如是非前非後非一非異非不一異又語曜明汝謂種子壞乃芽生今又問子種壞芽生壞時生耶未壞生耶壞後生耶壞時生者以壞爲生生則不生生而壞者以生爲壞壞則不壞云何種壞而得芽生譬如蔭壞身則不生无蔭有身理則不然以是當知種子旣壞芽則不生无種有芽理亦不然是故我言壞則不生若有說言壞時生者與壞同體云何得生譬如一身諸根同體云何頭壞而得足生頭壞足生理則不然以是當知種子壞時芽則不生生壞同體理亦不然是故我言壞時不生壞後生者生滅相離云何爲因譬如敗種種已先滅滅卽无芽云何芽後從敗種生以是當知壞後不生壞已芽生理亦不然是故我言種子壞後芽亦不生又語曜明種壞芽生生壞一耶生壞異耶生壞一者壞則相違云何同體滅則不生云何壞生生則不滅云何生壞生壞異者異則非因非因生果理則不然譬如虛空非兔角因虛空非因生兔角果理則不然以是當知異亦不生云何有生又語曜明未壞生者是則種子體中未變未變芽生芽生則无因无因有果无種有芽理則不然猶如无形影則不生形若未生有影生者當知此影不從形生譬如麻子麻子未壞油則不生以是當知未壞不生云何有生又語曜明壞後生者彼種已滅滅則无因滅後生芽此芽始生生則非果彼種滅已有芽生者理則不然猶有无乳酪則不生若无彼乳而有此酪是則酪有不從乳生以是當知壞後不生云何有生檢求生相畢竟永滅不可得故是故无生爾時辯才卽從座起安詳而進白天尊言我自思惟一切眾生飄浪生死皆由无明貪着愛見我又思惟愛見无明從何而有致令眾生飄浪生死是生死本從心生耶從眼生耶從耳生耶從鼻生耶從舌生耶從内生耶從外生耶從有生耶從空生耶我今等眾實未能了願爲解說得釋所疑天尊告曰辯才眞士善哉斯問子今復座當爲子說生死根本從空而生亦從有生從内而生亦從外生從鼻而生亦從舌生從眼而生亦從耳生本无從生亦從心生何以故心法空故心法旣空无明亦空无明旣空貪愛亦空貪愛旣空生死亦空生死旣空眼法亦空眼法空故耳法亦空耳法空故鼻法亦空鼻法空故舌法亦空舌法空故内外亦空内外空故空有亦空以是因緣生死根本從空而生又語辯才空法本空心法亦空云何空法生心法空心法旣空從空生心是則東方本空生西方空旣知東方本空不生西空當知空法本空不生心法心法旣空不從空生當知心法法相本空不生无明旣知无明本空不從心生當知无明本空不生貪着旣知貪着本空不從无明當知貪着亦空不生愛見旣知愛見本空不從貪着當知愛見亦空不生心法旣知心法本空不從愛見當知心法亦空不生眼法旣知眼法本空不從心生當知眼法亦空不生耳法旣知耳法本空不從眼生當知耳法亦空不生鼻法旣知鼻法本空不從耳生當知鼻法亦空不生舌法旣知舌法本空不從鼻生當知舌法亦空不生内法旣知内法本空不從舌生當知内法亦空不生外法旣知外法本空不從内生當知外法亦空不生有法旣知有法本空不從外生當知有法亦空不生空法旣知空法本空不從有生當知空法亦空不生生死旣知生死本空不從空生當知生死亦不生死一切有爲煩惱以是當知有爲生死眾生飄浪如虛中雲如空中色如谷中響如水中月如鏡中像如𤍠中炎如電中火如聾中聽如盲中視如啞中言如二頭鶴如三足鷄如龜中毛如兔中角中是无明貪着愛見生死之本亦復如是畢竟皆空不可論說譬如燈滅不可尋求生死本空亦復如是如大猛火如四毒蛇不可親近生死之法亦復如是子等當復作如是觀乃得无爲出離生死於是辯才等眾聞是要言歡喜踴躍歎未曾有於是大眾同聲稱善而說偈言无上大悲尊善巧說眞相世間煩惱本卽无上慧因眾生未能了故說斷貪瞋若知本非有生死卽道塲无明性永滅煩惱諒風聲慧眼常淸淨法見明重昏本來无二相麄妙信開緣若能辯无二三界不思議執心在眞相道塲恚貪瞋種子未曾滅芽莖實不生先有不從因先无何所生三時辯生法種子實非因自體未曾有芽莖何所從辯才无上士善諮生死因大悲諒无盡爲眾悉敷陳无明與生死譬如空谷聲聾盲所聞見世間實不然智者觀生死猶如大幻師土梗何曾走木雞詎翔空若能明斯趣一切不思議爾時天尊歎大眾言善哉善哉汝等今眾聞希有法體了眞相實如所陳乘我今日宣語將來一切眾生令得曉了與今无異爾時大眾稽首稱善辯邪正品第三爾時普等眞人卽從座起前進作禮上白天尊我自思惟天尊身相光明挺特微妙難思如金剛王摧折一切智慧明了結習永除端然獨步不思議城我今欲問未敢自陳願垂大慈賜示儀軌修行階級其義云何使將來世得見正眞天尊告曰善哉善哉普等眞士善能利益將來眾生能發斯問開悟愚蒙子今復座吾當爲說凡所問者具有二種一者正問二者邪問若正問者與道爲親若邪問者是魔眷屬普等又問何等爲正何等爲邪天尊告曰若人作有爲問无爲故問名爲邪問非有爲問非无爲問名爲正問若人見生故問見滅故問名爲邪問不見生問不見滅問名爲正問若人見住故問見壞故問名爲邪問不見住問不見壞問名爲正問若人見罪故問見福故問名爲邪問不見罪問不見福問名爲正問若人見淨故問見穢故問名爲邪問不見淨問不見穢問名爲正問若人見是故問見非故問名爲邪問不見是問不見非問名爲正問若人見親故問見疎故問名爲邪問不見親問不見疎問名爲正問若人見空故問見有故問名爲邪問不見空問不見有問名爲正問若人見苦故問見樂故問名爲邪問不見苦問不見樂問名爲正問若人見聖故問見凡故問名爲邪問不見聖問不見凡問名爲正問若人見善故問見惡故問名爲邪問不見善問不見惡問名爲正問若人見施故問見盜故問名爲邪問不見施問不見盜問名爲正問若人見持戒問見破戒問名爲邪問不見持戒問不見破戒問名爲正問若人見長故問見短故問名爲邪問不見長問不見短問名爲正問若人見貴故問見賤故問名爲邪問不見貴問不見賤問名爲正問若人見得故問見失故問名爲邪問不見得問不見失問名爲正問若人見邪故問見正故問名爲邪問不見邪問不見正問名爲正問若人見問故問不見問故問名爲邪問不見問問不見不問名爲正問如是等類皆有邪正邪正所有皆從心生心之所生皆是顚倒非有見有非无見无非生見生非滅見滅非住見住非壞見壞非罪見罪非福見福非淨見淨非穢見穢非是見是非非見非非親見親非疎見疎非空見空非有見有非苦見苦非樂見樂非聖見聖非凡見凡非善見善非惡見惡非施見施非盜見盜非持見持非犯見犯非長見長非短見短非貴見貴非賤見賤非得見得非失見失非邪見邪非正見正非問見問非見見見如是諸見皆悉虛妄如幻如夢无一眞實何以故諸法无心有心見法名爲邪見若人能知諸法无心不起心見是名正見是當知有心問者皆爲邪問无心問者乃名正問以是義故我今不令一切眾生斷滅煩惱而得眞相但欲度諸妄想眾生故說煩惱眞相二義實无生死可得眞相所以者何諸法淸靜本无二相无所往來是故我今不令眾生斷滅煩惱乃得眞相雖說煩惱實无煩惱之可斷滅雖說常樂亦无常樂之可欣慕旣无煩惱是故眾生不失眞相旣无眞相是故我今不捨煩惱若復有人於末世中能發此念體解正眞是名大乘修眞正行於是普等聞斯說已心大歡喜告諸大眾无億數人同體无爲俱入正眞爾時聖行大士白天尊言於未來世若有眾生於諸法中生有見心是則大道永沒不行於世若見三淸是淸淨境心所欣慕如此人者永劫修功不得解脫所以者何三淸境界名爲寂滅遠離諸塵不受諸愛若有見心則墮邪見非修正行名爲永失无上法邪於是天尊歎聖行言善哉善哉實如所言聖行眞士宿植德本明了實相通達无礙故於今日爲眾决疑眞爲深要若復有人於諸法中生有見心捨於穢土求三淸樂捨眾生身求眞道相欲斷煩惱而入无爲求離諸見乃得寂滅如是等相我說此人名大邪見憎慢之人譬如愚人畏於天地而欲走避所至之處不離天地眾生亦爾畏生死身疾捨三界有心猒離所得之身不離生死如是眾生未能見法求眞道相深實可哀眞道相者名爲不作无所起滅非有非无非長非短非大非小非色非心能體此相名爲修習眞道正行語聖行世間眾生无明障重眞道在身莫能覩見譬如愚人東西馳走覓虛空色而不能見卽色是空一切世間亦復如是心性馳騁欲求眞道不知身心卽是眞道譬如愚人但見竹木而不知火捨木求火而不知火已在木中一切世間亦復如是捨身求道而不知道已在身中捨木求火譬如愚人捨形求影默聲求響而不知形是影根聲爲響本以是當知世間邪見煩惱熾盛猶荆棘林如蒺梨園不可親近汝等今眾乘我今日宣示將來令知三淸不離煩惱令知大道不在他方但觀身心修習正行自然解脫永離煩惱常處三淸子善思惟自然安樂於是聖行又復白言大德天尊云何說言一切眾生卽是眞道而復告命修習正行乃得安樂若其是道何須修習猶如羽鳥何須習飛譬如鱗族何須習水雲昇雨降不關習學若諸眾生已是眞道何須修習而得安樂願爲解說得釋所疑天尊告曰聖行眞士善哉斯問如我向言眞道眾生如木中火非一非異非卽非離卽木有火而木非火離木无火而火非木木非是火故云非一火不離木故云非異以是當知眾生眞道非一非異非卽非離卽生有道而生非道離生无道而道非生生非是道故云非一道不離生故云非異以是當知若欲求火於木中求不於冰中求若欲求道於身中求不於他求於冰求火他方求道假使力能移山功能竭海力之彌勤功之殊妙終劫行之去道逾遠是故我今告諸眾生若欲求火當須人功備其鑽具運動力手然後見火眾生學道修習正行亦復如是當以善功備其種智觀此身中運動心神然得見道以是之故我令眾生修習正眞乃得安樂羽空鱗水亦須運用而得昇降空行水去眞道眾生不以爲類雲昇雨降无識无心不關習學如斯等類並是世間不比眞道子善思惟自當得解於是聖行又復白言大德天尊眾生求道於身中求不於他求身中空邪他方有邪天尊答曰聖行眞士三十六問名爲邪見聖行又問大德天尊見木有火見冰有水見冰无火見木无水邪天尊答曰聖行眞士爲諸未悟隨順世間聖行又問大德天尊冰有火耶木有水耶天尊答曰聖行眞士於虛空中見眾色像聖行又問大德天尊於冰求火於木求水斯見處耶天尊答曰聖行眞士見身求道滅諸有爲求得解脫斯非是處若求眞道但自觀身若求虛空但觀諸有觀身實相道從身生亦從心生從眼耳生從鼻舌生從四大生從百體生觀物眞相空從天生亦從地生亦從我生亦從他生從水火生從草木生從十方生從萬物生以是義故我說此經度微塵眾而未嘗見有一眾生得受度也何以故我眼旣空眾生亦空空无分别分别空故是故我眼智慧明淨能觀一切通達无礙觀諸三千大千世界過去未來一切眾生悉已受度以是因緣我說空中具足一切无量色像於是聖行并諸大眾聞說要言俱起作禮而說偈言具足一切智善哉奇特尊說今微妙法邪正甚分明顚倒生取捨正眞非有无心法非本有有心虛妄生善巧順諸有有滅齊正眞正眞无復相煩惱實本空眾生不異道諸見悉无爲有心欲除斷大行永不行三淸非遠妙寂滅在胸襟若起有心見惠牙永消摧天尊說此類名爲憎慢人猶如畏大地疾走欲藏身縱日馳千里非地不容身厭身欲求道見道不忘身存身去道遠生死反成親至眞无起滅大道離斷常若有體斯妙名爲修正眞眾生由障重失道唯見身將身欲求道觀色不知空譬如愚見木不知火所從影響非殊遠形聲是本源邪見生煩惱蒺䔧荆棘藂有見生毒害傷身何異斯三淸卽煩惱大道諒我身猶如木中火鑽具及人功積善求眞道安樂會正眞說經度一切筭數不能量照本元來去受度悉虛陳虛空量无際眾生何所依我眼本淸淨通達了大千
