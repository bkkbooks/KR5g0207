front:
  text: 未來及過去見在盡微塵
  hash: sha256:09a595f1ac8501bbe8ca8248d27c86cdab8f8ec599b3d1e182c01e9dfd0f389c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0207_YP-C_03diji-05-0018a, image: JY009/03diji-05-0018a.png}
body:
  text: 久於无量劫悉己會正眞觀身品第四爾時大慈眞人卽從座起稽首禮問白天尊言我等今眾心自念言天尊所說微妙難思煩惱眞相性無差别其義幽微我今等眾親承聖旨得釋所疑將來眾生心根未悟聞此大法云何得解天尊所說三淸非遠道卽我身一切眾生聞身有道未了斯義益加疑網當以何法得釋彼疑令諸眾生泰然安樂天尊答曰善哉善哉大慈眞士於无量劫荷負一切眾生苦惱故於今日善發斯問子今復座吾當爲說令諸將來有心之人使得安樂若有眾生入我法門聞我妙義未能曉了當以三法安慰其心令得開悟何謂三法一者若有眾生聞此大乘未能信受當以五戒修攝其身令无放逸五根明淨體性調和於法无畏堪任聽受二者若有眾生聞此大乘未能善解當以三定繼錄其心令无動應心地端靜性氣調和於法无畏堪任誦持三者若有眾生聞此大乘未能通觀當以六慧遍被身心令无障礙内外明淨身意澄淸慧洞虛空了見眞性於法无畏堪任寄付何謂五戒一者若有眼根貪著色塵當以妙林大戒觀彼色塵隨時遷易念念无常无可貪著觀我眼根與彼无異二者若有耳根貪著聲塵當以妙林大戒觀彼聲塵隨時遷易念念无常无可貪著觀我耳根與彼无異三者若有鼻根貪著香塵當以妙林大戒觀彼香塵隨時遷易念念无常无可貪著觀我鼻根與彼无異四者若有舌根貪著味塵當以妙林大戒觀彼味塵隨時遷易念念无常无可貪著觀我舌根與彼无異五者若有身根貪著法塵當以妙林大戒觀彼法塵隨時遷易念念无常无可貪著觀我身緣與彼无異何謂三定一者若有眾生心神馳動多所貪著當以妙林大定觀諸世間如幻如夢如焰如電非眞實有旣知非有心不馳動是名安定二者若有眾生心神馳動多所瞋恚當以妙林大定觀諸世間如聲如響如霧如雲非眞實有旣知非有无所瞋恚名爲法定三者若有眾生心神馳動多有癡慢當以妙林大定觀諸世間如風如空如泡如影非眞實有旣知非有无可癡慢名爲决定何謂六慧一者旣了彼色隨時遷易念念无常无可貪著眼根淸淨名爲見慧二者旣了彼聲隨時遷易念念无常无所貪著耳根淸淨名爲聞慧三者旣了彼香隨時遷易念念无常无所貪著鼻根淸淨名爲通慧四者旣了彼味隨時遷易念念无常无所貪著舌根淸淨名爲辯慧五者旣了諸法隨時遷易念念无常无所貪著身緣淸淨名爲覺慧六者旣了三毒隨時遷易念念无常无所滯礙心根淸淨名爲洞慧大慈眞士若後末世一切眾生欲入法門當以三法安定其心令无所畏旣无畏己自然安樂身心堅固常住不動六慧明淨通達无礙觀諸世間无非妙相以是當知不斷煩惱而得眞相汝等今眾勿以此法輕示非人一念疑毁萬劫不生愼之愼之爾時遍通眞人白天尊言我等今眾得聞大法身心踴躍快樂安穩得无所畏不可思議猶有疑昧未敢諮陳伏願天尊特垂聽許天尊告曰遍通眞士有所疑網恣汝所問吾當辯說以示未聞於是遍通白天尊言大德法王云何說言若有眾生欲入法門當以三法安慰其心令得安樂一切眾生本有心邪若是有心心性已定云何說言以此三法安定其心令得无畏若本无心云何得定而今說言以此三法安慰其心令得定邪天尊告曰善哉斯問諦聽諦聽吾當辯說令諸將來得了所疑遍通眞士一切眾生心法如生云何一切眾生心法如生一切眾生本有生邪若有生者生從何有一切眾生本无生邪若无生者見有生身汝等今眾見身有邪見身无邪遍通答曰大德天尊我等今眾見身是无何以故前色滅故後色生故天尊告曰遍通眞士心法亦爾非有非无念念生滅前心滅故不爲後因後心生故不爲前果是故我言一切眾生心法如生遍通又言大德天尊旣云一切眾生心法如生生法見生生法如心心可見邪天尊答曰遍通眞士心法可見欲見心法還如見生生无方所欲見心法亦无方所遍通又言大德天尊旣云心法如生俱无方所云何安慰令得安樂天尊答曰遍通眞士身可安邪遍通答言大德天尊身法念念不可安慰天尊告曰遍通眞士心法亦然不可安慰遍通又言大德天尊旣不可安云何向言安慰其心令得樂耶天尊答曰遍通眞士爲見有身故令安慰旣安慰已知心非有亦復非无非有非无名得眞心故得安樂是故我今以此三法安慰其心令得安樂是諸大眾聞天尊說咸皆開悟同聲稱善而說偈言法王三界大悲尊見身端坐不思議爲眾演斯微妙法開悟羣生无上因故知煩惱同眞相了達道塲等无明初學心中未淸靜大慈方便啟重昏故得天尊爲敷演妙林三法曉初心五戒觀身五根靜三定攝心三毒除一乘遍被三千土六慧重修九夜淸了悟幻夢非眞有非眞有法亦非空故得住居安樂土非空幻有悉常存常存非離人間土人中妙相甚奇姿昔日未悟名煩惱今辰大覺號眞仙一體兩名隨物見好見兩名同一身遍通至眞无上士懷念慇懃不離心請問眾生所生得有心无心定云何今蒙大悲无上訣眾生有心心若生生法非无亦非有有心非有亦非无前生後生不相續有心无心不相因見身非有同心法求心非无如見身能知身心非一異豈執身心定有无說去兩偏无所兩又忘一中何所中偏中了然无所有重玄微妙不思議故得身心可安慰眞心萬劫永常存爾時天尊聞諸大法說偈頌已告諸眞人汝等大眾於此座會深解法相快樂安隱誠如所言眞實无異於將來世咸令眾生皆得開悟是時大眾咸皆歡喜稽首受命同時而退童子問品第五爾時侍座童子名曰慧明從座而起整頓衣冠稽首作禮上白天尊言大慈天尊微妙光明普照十方微塵世界一切國土諸眞聖眾无億數人俱來集會不思議城土地平正宮殿希有容微塵眾无有迫迮此地何緣而有斯妙眾眞行業修何功德遇値寶光得入斯座希有難思聞此妙林快樂无極願垂告誨開悟將來於是天尊歎童子言善哉善哉慧明童子善能激發微妙因緣使將來世得釋所疑不思議山名大福堂出離生死國土淸淨非是二乘所能覩見過去未來三世天尊之所集會一微塵土容八萬眾不可思議宮殿牀榻百味甘香衣服臥具花菓林木通身浴池皆是七寶若有所須應念而至福德之土不可思議非我今日言所能盡十方國土三千世界一切微塵无鞅數眾眞人集會皆是上士純一无二智慧圓明了諸法性於无量劫植眾德本故於今日遇値光明而得集會見我今日微妙大乘宣通法教普度无量一切眾生得聞此經妙林名字一章一句當知是人塵沙身分所有三業造諸過惡皆悉淸淨不復受報若有眾生聞此經名及以誦念一章一句其人所生常居淨土衣食充足无所乏少聞此經已不墮三惡刀山劎樹銅柱爐炭寒冰鐵床一切苦報自然摧滅所經行處常居快樂兵災毒獸不能傷害童子又問大德天尊願爲廣說眞人所行觀諸法性以何心力而得自在通達无礙復遇尊經聞微妙法天尊告曰慧明童子眞人所行於諸法中无所希望心性滅故觀諸色法不生貪著知眼空故聞諸音聲不生貪著知耳空故齅諸香氣不生貪著知鼻空故餐諸美味不生貪著知舌空故持諸寶物不生貪著知手空故行諸平地不生貪著知足空故見諸天堂不生娛樂知无我故見諸地獄不生怖畏知无苦故見人施與不生歡喜知无得故見人劫奪不生瞋怒知无失故見人讚歎不生欣悅知无譽故見人毁辱不生恚恨知无損故見玉京山不以爲高无長相故見諸堆峊不以爲卑无短相故見諸騫樹不以爲賖无夀相故見諸槿花不以爲促无夭相故見大羅天不以爲遍无大相故見諸毫末不以爲細无小相故見諸猛火不以爲𤍠无燒相故見諸渤海不以爲濡无濕相故見諸彫畫不以爲能无巧相故見諸愚訥不以爲頑无拙相故見諸布施不以爲難无財相故見諸貪恡不以爲惜无慳相故見諸眾生不以爲異无有相故見諸虛空不以爲一无无相故見諸親族不以爲戀无愛相故見諸怨家不以爲惡无憎相故見諸天地不以爲久无住相故見諸電光不以爲疾无去相故見日初出不以爲東无出相故見日終沒不以爲西无沒相故无西无沒无日没故无東无出无日出故以是當知眞人見法而不見故以不見故故於今日得居淨土値希有光聞我今日演說大乘微妙經典能以一心信解受持爾時侍座童子名曰善信從座而起稽首作禮一心瞻仰白天尊言大德天尊所說甚深微妙難思若有眾生聞斯法者以何心力而得開悟天尊告曰善信童子若有眾生得遇斯經未能善解當以慧心觀察其身眼耳鼻舌一切諸根爲是有邪爲是无邪爲有因邪爲无因邪若言有我眼耳諸根因四大生而有我者當自思惟四大性空云何得合若四大空合成我身身從四大四大旣空我身亦空何以故由本空故若言我身眼耳諸根因四大生四大性異云何得合若四大異合成我身身從四大我身亦異何以故由本異故若言我身眼耳諸根因四大生四大非合云何我身四大合生四大非合合生我者虎鹿蛇鼠性非合故云何合生以是當知我今身者如風如影如露如電如幻如夢如聲如響畢竟寂滅了无因故能知是見名爲法觀以此心力能生无量諸功德門住於三淸常居淨土能於諸見心无起動以一慧心觀諸萬類悉皆淸淨善信童子得聞是已心生歡喜歎未曾有於是天尊而說偈曰我今所演說一切諸天尊過去及未來皆同一心力十方微塵土所有諸法王俱演微妙義一乘无上經若有一人聞一章一句偈誓心欲奉持宣通未來世如此善男子及以善女人所在經行處灾疫不敢傷若有一心念五苦盡消摧又請說眞士所行奇特因眞人所得法觀身知悉空苦樂无二相憎愛悉齊同高卑无異趣大小不殊形日出非初合日沒詎終亡東西无定所出沒亦无方又問何心力得斯平等觀示以慧觀法支節並消融四大性非合虎鹿不同羣以是知虛幻露電盡皆空畢竟无起滅法觀心日明常居淸淨土長樂永未央是時侍座童子諸來大眾聞天尊說微妙偈頌歡喜踴躍歎未曾有於是大眾一時稽首同聲稱善作禮而退隨順品第六爾時天尊告遍通言於末世中若有一人解我所說稱揚妙義宣示未聞令得了悟能體深義不隨文字知諸法性无可貪著當知是人已於无量无邊諸天尊所種植善功久已成辨世間人民於其人處供給供養衣食臥具香花燈燭資身藥餌諸所無有隨順給與能如此者所得功德與我所資功德无異何以故如是人者卽是大乘无上法牙紹隆法藏令无斷絶其人前身曾入寶城聞我大乘微妙經典託生下土宣我正教是故我說供養此人與我无異何以故是人深知我之妙趣隨宜說法无所執滯是故世間供養是人功德无量遍通白言大德天尊何謂隨宜順眾生說无所執邪天尊告曰遍通眞士我所說法隨順眾生說一乘經說三世法說有爲法說无爲法說人間法說出世法說穢濁法說淸淨法說罪說福說苦說樂說因說果如是等說名爲隨順眾生世間猶如幻師所作幻術无有决定又如夜夢所有見事皆悉虛妄无有眞實若有眾生深達斯義如此之人是我眞子堪任委寄秉持法藏令无斷絶遍通白言大德天尊所說要妙隨順世間无有决定无罪福邪无苦樂耶天尊答曰遍通眞士我所說法隨順眾生說罪爲福說福爲罪說苦爲樂說樂爲苦是故我所說法无有决定遍通白言大德天尊何謂說罪爲福說福爲罪說苦爲樂說樂爲苦旣无决定一切眾生云何修習出離生死得眞解脫天尊答曰遍通眞士我所說法說罪爲福一切眾生所作眾罪罪性本空无所有故說福爲罪一切眾生所作之福有心希望貪著福故乃至苦樂因果諸所說法亦復如是以此當知我說罪福苦樂因果亦无决定若人能知諸法不定心无所繫无所繋故名得解脫不復往來生死六趣常樂淸淨安住不動是名隨宜順世間說隨宜說者汲引眾生无有决定以不决定令諸眾生得入定位无所怖畏能入三界爲眾導師度脫一切无量眾生得入常樂爾時遍通又復白言大德天尊我自思惟我等大眾聞說妙義心中了然无復疑惑於將來世有諸眾生聞斯深奥未能決了天尊所說罪福苦樂无决定相皆是隨順世間眾生以何心力而順世間无决定相天尊答曰遍通眞士我今所說以大悲心熏修一切隨順世間所說文字言辭章句皆是方便隨方接引令得度脫有爲虛妄无明苦惱曉了法性得見正眞是名隨順眾生隨宜說法遍通又問大德天尊何以於諸眾生而起大悲无虛妄邪天尊答曰遍通眞士譬如有人問覓虛空我今說空是虛妄邪遍通答言大德天尊如是說空空可說耶天尊答曰遍通眞士空不可說我今說空虛空旣空我說亦空以是當知世間虛妄本无所有我說世間不墮虛妄何以故虛妄性空我說虛妄說妄亦空是故我說不墮虛妄遍通白言大德天尊所說世間一切皆空隨順眾生有何利益天尊答曰遍通眞士爲化引故得出離故入空門故滅諸見故了无相故明无作故一切諸行畢竟寂滅永不復生旣不生滅常住不動是故我今以大悲心隨順世間令諸眾生得此大利爾時德滿眞人卽從座起稽首禮問白天尊言大德天尊云何眞人於世間法心无所著天尊答曰德滿眞士善哉斯問汝今等眾於意云何德滿答言大德天尊我自思惟眞人所行心性寂滅无二相故若有二相卽是虛妄我今觀法聞善不喜聞惡不怒无愛憎相心性寂滅无所希望觀諸世間猶如幻師見所幻事知此非眞无所貪著眞人所見一切世間諸有爲法亦復如是知悉非眞无所貪著是時侍座童子名曰上相聞眞人說心大歡喜踴躍无量言不能盡猶如長者亡所愛子已經數日忽然更活我今得聞眞人說法歡喜亦然猶有疑昧未能自了前進稽首白眞人言大德眞士所說眞人觀世間法无有二相无二相故无所貪著若有貪著卽是虛妄虛妄法者猶有夢幻旣非眞有假使虛妄有何失耶眞人答曰上相童子善能問我令諸將來得釋所疑我今所說若有眾生於有爲法多生貪著卽是虛妄虛妄心起卽有二見若有眾生能了二相二相无二當知此人所見虛妄亦无虛妄是故我今所說法言若有二見貪著世間卽是虛妄无二見者觀諸虛妄悉非世間旣非世間卽无二見无二見故亦无虛妄以是當知了虛妄者觀諸世間實无所失上相童子又復問言大德眞士所說虛妄由有二見貪著世間皆從心起未了世間及以心法何者爲因以何爲果爲是心法能生世間爲是世間能生心法若无心法誰取世間若无世間心何所取若云心法能取世間未有心法應无世間若云世間心有所取未有世間應无心法如是二義實未能了願垂辯釋開示未聞眞人答曰上相童子吾今語汝心法世間非因非果非前非後非一非異非有非无而亦有无亦是一異乃至因果譬如鷄母能生鷄子猶如鷄子復生鷄母如是母子非因非果非前非後非一非異非有非无而亦有无亦是一異乃至因果若了无生无如是問若有所得名爲邪問邪問之人永失无量大乘知見上相童子云何於空谷響而求生相於焦穀中而求牙相心法世間亦復如是畢竟永滅不可論說如大毒藥不可得嘗如盛猛火不可親近說世間相及說心法如盲說色如聾說聲畢竟无因不可論說爾時天尊歎德滿言善哉善哉實如所言善能分别心法世間二无所有俱不可說深實要言於是大眾聞斯語已心大歡喜而說偈言妙哉奇特尊開發如是問若有一人聞解了深妙義宣通此大法開示悟將來當知此大士已種无量功世間一切眾當於是人處供給所乏須功德量難思解此深奥義是我眞法子紹隆妙林典能資无上才了我隨宜說苦樂本无因猶如大幻師見所爲幻事雖順人間法慧心了無緣汲引諸眾生決定入大乘達了世間性解脫無殊異我今說世間不墮於虛妄問空求色像辯空亦隨機德滿眞大士爲眾問行心旣蒙无上質自陳昔所行雖順世間法所見无虛妄上相眞童子未了達所疑眞人善通釋冰結並消融心性世間法非果亦非因能知盲說色虛谷豈勞陳
